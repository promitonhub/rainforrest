<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>RAINFOREST FALLS 🌿</title>

  <!-- ======================================================
       GOOGLE FONT
       ====================================================== -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    /* ======================================================
       RESET
       ====================================================== */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      width:100%;
      overflow-x:hidden;
      scroll-behavior:smooth;
      -webkit-text-size-adjust:100%;
    }

    body{

      width:100%;
      min-height:100vh;

      overflow-x:hidden;
      overflow-y:auto;

      position:relative;

      font-family:'Fredoka', sans-serif;

      color:white;

      background:#000;

      -webkit-overflow-scrolling:touch;

      text-shadow:
      0 2px 12px rgba(0,0,0,0.42);
    }

    img{
      display:block;
      max-width:100%;
    }

    /* ======================================================
       BACKGROUND IMAGE
       ====================================================== */

    .bg-image{

      position:fixed;
      inset:0;

      width:100vw;
      height:100lvh;

      background-image:
      url('https://lh3.googleusercontent.com/d/1wlFgIEOZX_cAw480D_DeZwt1XyHopqV0=w2000');

      background-size:cover;
      background-position:center center;
      background-repeat:no-repeat;

      z-index:-70;

      pointer-events:none;
    }

    /* ======================================================
       DARK OVERLAY
       ====================================================== */

    .bg-overlay{

      position:fixed;
      inset:0;

      width:100%;
      height:100lvh;

      background:
      linear-gradient(
        to bottom,
        rgba(0,0,0,0.04),
        rgba(0,0,0,0.52)
      );

      z-index:-65;

      pointer-events:none;
    }

    /* ======================================================
       GLITTER PARTICLES
       ====================================================== */

    .glitter-layer{

      position:fixed;
      inset:0;

      overflow:hidden;

      pointer-events:none;

      z-index:-35;
    }

    .glitter{

      position:absolute;

      width:4px;
      height:4px;

      border-radius:50%;

      background:white;

      opacity:0;

      filter:
        blur(0.5px)
        drop-shadow(0 0 6px rgba(255,255,255,0.9));

      animation:
        glitterFlash linear infinite;

      will-change:
        transform,
        opacity;
    }

    .glitter::before{

      content:"";

      position:absolute;

      inset:-6px;

      border-radius:50%;

      background:
      radial-gradient(
        circle,
        rgba(255,255,255,0.45),
        transparent 70%
      );

      opacity:0.6;
    }

    @keyframes glitterFlash{

      0%{
        opacity:0;
        transform:
          scale(0.2)
          rotate(0deg);
      }

      10%{
        opacity:0;
      }

      20%{
        opacity:0.9;
        transform:
          scale(1.6)
          rotate(90deg);
      }

      35%{
        opacity:0.2;
        transform:
          scale(0.7)
          rotate(180deg);
      }

      100%{
        opacity:0;
        transform:
          scale(0.2)
          rotate(360deg);
      }
    }

    /* ======================================================
       FLOATING MACAW
       ====================================================== */

 .macaw-overlay{

  position:fixed;

  left:-32px;
  top:19%;

  width:165px;

  z-index:12;

      pointer-events:none;

      will-change:
        transform;

      filter:
        drop-shadow(0 16px 28px rgba(0,0,0,0.38));

      animation:
        macawFloat 17s ease-in-out infinite;
    }

    @keyframes macawFloat{

      0%{

        transform:
          translateY(0px)
          rotate(0deg);

      }

      25%{

        transform:
          translateY(-8px)
          rotate(-1deg);

      }

      50%{

        transform:
          translateY(5px)
          rotate(1deg);

      }

      75%{

        transform:
          translateY(-5px)
          rotate(-0.5deg);

      }

      100%{

        transform:
          translateY(0px)
          rotate(0deg);

      }
    }

    /* ======================================================
       FLOATING LEAVES
       ====================================================== */

    .leaf{

      position:fixed;
      top:-10vh;

      font-size:24px;

      opacity:0.60;

      pointer-events:none;

      z-index:1;

      animation-name:leafFall;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
    }

    .leaf1{
      left:8%;
      animation-duration:13s;
      animation-delay:0s;
    }

    .leaf2{
      left:72%;
      animation-duration:17s;
      animation-delay:2s;
    }

    .leaf3{
      left:45%;
      animation-duration:21s;
      animation-delay:5s;
    }

    @keyframes leafFall{

      0%{
        transform:
          translate3d(0,-10vh,0)
          rotate(0deg)
          scale(1);

        opacity:0;
      }

      10%{
        opacity:0.65;
      }

      20%{
        transform:
          translate3d(25px,15vh,0)
          rotate(80deg)
          scale(1.02);
      }

      40%{
        transform:
          translate3d(-35px,38vh,0)
          rotate(160deg)
          scale(0.96);
      }

      60%{
        transform:
          translate3d(40px,62vh,0)
          rotate(240deg)
          scale(1.04);
      }

      80%{
        transform:
          translate3d(-28px,88vh,0)
          rotate(320deg)
          scale(0.98);
      }

      100%{
        transform:
          translate3d(18px,120vh,0)
          rotate(400deg)
          scale(1);

        opacity:0;
      }
    }

    /* ======================================================
       GLASS BUBBLES
       ====================================================== */

    .bubble{

      position:fixed;

      border-radius:50%;

      pointer-events:none;

      z-index:2;

      background:
      radial-gradient(
        circle at 30% 30%,
        rgba(255,255,255,0.50),
        rgba(255,255,255,0.08)
      );

      border:
      1px solid rgba(255,255,255,0.16);

      box-shadow:
        inset 0 0 14px rgba(255,255,255,0.24),
        0 0 20px rgba(255,255,255,0.10);

      opacity:0;

      will-change:
      transform,
      opacity;
    }

    @keyframes bubbleFloat{

      0%{
        transform:
          translate3d(0,0,0)
          scale(0.7);

        opacity:0;
      }

      10%{
        opacity:0.92;
      }

      50%{
        transform:
          translate3d(
            calc(var(--drift) * 0.5),
            -40vh,
            0
          )
          scale(1);
      }

      100%{
        transform:
          translate3d(
            var(--drift),
            -92vh,
            0
          )
          scale(1.12);

        opacity:0.85;
      }
    }

    @keyframes bubblePop{

      0%{
        transform:scale(1);
        opacity:1;
      }

      40%{
        transform:scale(1.28);
        opacity:0.95;
      }

      100%{
        transform:scale(1.95);
        opacity:0;
      }
    }

    /* ======================================================
       APP
       ====================================================== */

    .app{

      width:100%;
      max-width:430px;

      margin:0 auto;

      padding:
      env(safe-area-inset-top)
      18px
      env(safe-area-inset-bottom);

      position:relative;
      z-index:5;
    }

    .top-logo{

      width:120px;

      margin:0 auto;

      margin-top:4px;
      margin-bottom:-10px;
    }

    .hero{

      display:flex;
      justify-content:center;
      align-items:center;

      margin-top:-8px;
      margin-bottom:-10px;
    }

    .hero-title{

      width:100%;
      max-width:360px;

      filter:
      drop-shadow(0 10px 25px rgba(0,0,0,0.45));
    }

    .glass-card{

      width:100%;

      margin-top:8px;

      padding:24px 18px;

      border-radius:34px;

      background:
      rgba(255,255,255,0.12);

      border:
      1px solid rgba(255,255,255,0.18);

      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);

      box-shadow:
      0 12px 40px rgba(0,0,0,0.22);
    }

    .card-title{

      text-align:center;

      font-size:28px;

      margin-bottom:12px;
    }

    .card-subtitle{

      text-align:center;

      line-height:1.7;

      font-size:15px;

      margin-bottom:24px;
    }

    .input-group{

      position:relative;

      margin-bottom:18px;
    }

    .input-icon{

      position:absolute;

      top:50%;
      left:18px;

      transform:translateY(-50%);
    }

    input{

      width:100%;

      border:none;
      outline:none;

      border-radius:22px;

      padding:
      18px
      18px
      18px
      52px;

      background:
      rgba(255,255,255,0.14);

      color:white;

      font-size:16px;

      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    input::placeholder{
      color:rgba(255,255,255,0.75);
    }

    button{

      width:100%;

      border:none;

      border-radius:24px;

      padding:18px;

      background:
      linear-gradient(
        135deg,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.14)
      );

      color:white;

      font-size:18px;
      font-weight:700;

      cursor:pointer;

      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);

      transition:0.25s ease;
    }

    button:active{
      transform:scale(0.98);
    }

    .footer{

      margin-top:36px;
      margin-bottom:30px;

      text-align:center;
    }

    .footer-text{

      font-size:14px;

      line-height:1.7;

      margin-bottom:18px;
    }

    .footer-logo{

      display:flex;
      justify-content:center;
    }

    .footer-logo img{
      width:120px;
    }

  </style>

</head>

<body>

  <!-- ======================================================
       BACKGROUND
       ====================================================== -->

  <div class="bg-image"></div>

  <div class="bg-overlay"></div>

  <!-- ======================================================
       GLITTERS
       ====================================================== -->

  <div class="glitter-layer">

    <div class="glitter" style="top:12%; left:18%; animation-duration:7s; animation-delay:1s;"></div>
    <div class="glitter" style="top:22%; left:74%; animation-duration:9s; animation-delay:2s;"></div>
    <div class="glitter" style="top:34%; left:48%; animation-duration:8s; animation-delay:0s;"></div>
    <div class="glitter" style="top:52%; left:82%; animation-duration:10s; animation-delay:4s;"></div>
    <div class="glitter" style="top:66%; left:28%; animation-duration:11s; animation-delay:3s;"></div>
    <div class="glitter" style="top:74%; left:62%; animation-duration:8s; animation-delay:5s;"></div>
    <div class="glitter" style="top:16%; left:56%; animation-duration:12s; animation-delay:2s;"></div>
    <div class="glitter" style="top:42%; left:14%; animation-duration:9s; animation-delay:6s;"></div>

  </div>

  <!-- ======================================================
       MACAW
       ====================================================== -->

  <img
    src="https://lh3.googleusercontent.com/d/1Kc5JoNj4O95QRgxGsc8odeGW845JWNrI"
    class="macaw-overlay"
    alt="Macaw"
  >

  <!-- ======================================================
       LEAVES
       ====================================================== -->

  <div class="leaf leaf1">🌿</div>
  <div class="leaf leaf2">🍃</div>
  <div class="leaf leaf3">🌱</div>

  <!-- ======================================================
       APP
       ====================================================== -->

  <div class="app">

    <img
      src="https://ci3.googleusercontent.com/mail-sig/AIorK4zgCzgfj7mV4jDsEo9FA5FmwI06SwLkAVgJCEq7bIl3YhJP7b3nWRiK7P6-SZF-rvpXWiy5olswOQwI"
      class="top-logo"
      alt="Top Logo"
    >

    <section class="hero">

      <img
        src="https://lh3.googleusercontent.com/d/1220_kk_C4yBBZkoplEHs8qFWuouAdrCh"
        class="hero-title"
        alt="Rainforest Falls"
      >

    </section>

    <div class="glass-card">

      <div class="card-title">
        👋 Welcome Parent
      </div>

      <div class="card-subtitle">
        Enter your registered phone number below
      </div>

      <div class="input-group">

        <div class="input-icon">
          📞
        </div>

        <input
          type="text"
          placeholder="Phone Number"
        >

      </div>

      <button>
        🌴 Search 🌴
      </button>

    </div>

    <div class="footer">

      <div class="footer-text">
        🌿 Rainforest Falls Kids Carnival ✨<br>
        Adventure, friendship & unforgettable memories 💚
      </div>

      <div class="footer-logo">

        <img
          src="https://chop.imgix.net/production/e84dfb1c-17d8-4cef-ab61-ee25b808e2df/logo/1584669001294.png"
          alt="Footer Logo"
        >

      </div>

    </div>

  </div>

  <!-- ======================================================
       BUBBLES
       ====================================================== -->

  <script>

    const activeBubbles = [];

    const MIN_BUBBLES = 1;
    const MAX_BUBBLES = 2;

    function createBubble(){

      if(activeBubbles.length >= MAX_BUBBLES){
        return;
      }

      const bubble =
      document.createElement("div");

      bubble.className = "bubble";

      const size =
      26 + Math.random() * 36;

      bubble.style.width =
      size + "px";

      bubble.style.height =
      size + "px";

      bubble.style.left =
      Math.random() * window.innerWidth + "px";

      bubble.style.top =
      (window.innerHeight + 50) + "px";

      bubble.style.setProperty(
        "--drift",
        (Math.random() * 220 - 110) + "px"
      );

      const duration =
      14 + Math.random() * 8;

      bubble.style.animation =
      `bubbleFloat ${duration}s linear forwards`;

      bubble.style.opacity =
      0.24 + Math.random() * 0.32;

      document.body.appendChild(
        bubble
      );

      activeBubbles.push(bubble);

      setTimeout(() => {

        bubble.style.animation =
        "bubblePop 0.6s ease-out forwards";

      }, duration * 1000 * 0.92);

      setTimeout(() => {

        bubble.remove();

        const index =
        activeBubbles.indexOf(bubble);

        if(index > -1){
          activeBubbles.splice(index,1);
        }

      }, duration * 1000 + 1500);
    }

    for(let i = 0; i < MIN_BUBBLES; i++){

      setTimeout(() => {

        createBubble();

      }, i * 800);
    }

    setInterval(() => {

      if(activeBubbles.length < MIN_BUBBLES){

        createBubble();

      }else if(
        activeBubbles.length < MAX_BUBBLES &&
        Math.random() > 0.72
      ){

        createBubble();
      }

    }, 4200);

  </script>

</body>
</html>
