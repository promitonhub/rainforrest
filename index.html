<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" type="image/png" href="./favicon.png"/>
<link rel="apple-touch-icon" href="./favicon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>RAINFOREST FALLS 🌿</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>

/* ======================================================
   RESET
====================================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  width:100%;
  overflow-x:hidden;
  scroll-behavior:smooth;
  -webkit-text-size-adjust:100%;
}

body{
  width:100%;
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;
  position:relative;
  font-family:'Fredoka',sans-serif;
  color:white;
  background:#000;
  -webkit-overflow-scrolling:touch;
  -webkit-touch-callout:none;
  text-shadow:0 2px 12px rgba(0,0,0,0.40);
}

/* ======================================================
   IMAGE PROTECTION
====================================================== */

img{
  display:block;
  max-width:100%;
  -webkit-user-drag:none;
  user-select:none;
  -webkit-touch-callout:none;
  pointer-events:none;
}

button,input{
  pointer-events:auto;
}

/* ======================================================
   LOADER SCREEN  ← replaces old skeleton-screen
====================================================== */

.loader-screen{
  position:fixed;
  inset:0;
  z-index:999999;
  overflow:hidden;
  background:linear-gradient(180deg,#07140c 0%,#0d1d14 100%);
  transition:opacity 0.8s ease, visibility 0.8s ease;
}

.loader-screen.hidden{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

/* Canopy glow */
.loader-glow{
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top left, rgba(255,255,255,0.07), transparent 38%);
}

/* Atmospheric orbs */
.loader-orb{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  pointer-events:none;
}

.loader-orb-1{ width:120px; height:120px; top:11%; left:-52px; }
.loader-orb-2{ width:90px;  height:90px;  right:-28px; top:48%; }
.loader-orb-3{ width:72px;  height:72px;  bottom:8%; left:18%; }

/* Static leaves — no animation until real app wakes */
.loader-leaf{
  position:absolute;
  font-size:26px;
  opacity:0.55;
  pointer-events:none;
}

.loader-leaf-1{ top:18%; right:14%; }
.loader-leaf-2{ top:58%; left:8%; }
.loader-leaf-3{ bottom:16%; right:20%; }

/* Macaw — left edge, partially off-canvas */
.loader-macaw{
  position:fixed;
  left:-32px;
  top:22%;
  width:165px;
  z-index:4;
  pointer-events:none;
  filter:drop-shadow(0 0 34px rgba(10,40,20,0.5));
  transform-origin:center;
}

@media (prefers-reduced-motion:no-preference){
  .loader-macaw{
    animation:macawBreath 4s ease-in-out infinite;
  }
}

@keyframes macawBreath{
  0%  { transform:scale(1); }
  50% { transform:scale(1.03); }
  100%{ transform:scale(1); }
}

/* Center column */
.loader-column{
  position:relative;
  width:100%;
  max-width:430px;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 8px) 18px env(safe-area-inset-bottom);
  z-index:5;
}

/* Shared pulse */
@keyframes softPulse{
  0%  { opacity:0.62; }
  50% { opacity:1; }
  100%{ opacity:0.62; }
}

.loader-logo{
  width:118px;
  margin:0 auto -8px auto;
  opacity:0.85;
  animation:softPulse 3s ease-in-out infinite;
}

.loader-hero{
  width:100%;
  max-width:360px;
  display:block;
  margin:0 auto;
  animation:softPulse 3s ease-in-out infinite;
}

/* Glass skeleton card */
.loader-card{
  margin-top:10px;
  border-radius:34px;
  padding:24px 18px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.10);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}

.loader-bar,
.loader-input-skel,
.loader-button-skel,
.loader-footer-bar{
  background:rgba(255,255,255,0.08);
  border-radius:999px;
  animation:skeletonBreathe 2s ease-in-out infinite;
}

/* Organic desync — each bar slightly offset */
.loader-bar:nth-child(1)      { animation-delay:0s; }
.loader-bar:nth-child(2)      { animation-delay:0.2s; }
.loader-bar:nth-child(3)      { animation-delay:0.45s; }
.loader-input-skel             { animation-delay:0.6s; }
.loader-button-skel            { animation-delay:0.8s; }

@keyframes skeletonBreathe{
  0%  { opacity:0.42; }
  50% { opacity:0.82; }
  100%{ opacity:0.42; }
}

/* Card bar sizing */
.loader-title-bar{ width:60%; height:28px; margin:0 auto 20px auto; }
.loader-subtitle-bar{ width:100%; height:15px; margin-bottom:12px; }
.loader-subtitle-bar.short{ width:72%; margin-bottom:26px; }
.loader-input-skel{ width:100%; height:58px; border-radius:22px; margin-bottom:18px; }
.loader-button-skel{ width:100%; height:60px; border-radius:24px; }

/* Footer skeleton */
.loader-footer{
  margin-top:34px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.loader-footer-bar{ width:82%; height:14px; margin-bottom:10px; }
.loader-footer-bar.short{ width:58%; }

.loader-footer-logo{
  width:112px;
  margin-top:14px;
  opacity:0.45;
  filter:grayscale(1) saturate(0);
  animation:softPulse 3s ease-in-out infinite;
}

/* ======================================================
   REAL APP WRAPPER  ← fades in after loader hides
====================================================== */

.real-app{
  opacity:0;
  transition:opacity 1.1s ease;
}

.real-app.visible{
  opacity:1;
}

/* ======================================================
   BACKGROUND
====================================================== */

.scene{
  position:fixed;
  inset:0;
  z-index:-30;
  overflow:hidden;
}

.scene-img{
  position:absolute;
  inset:0;

  background:
    url('./ChatGppPT Image May 9, 2026, 10_52_48 PM (1).png')
    center center / cover
    no-repeat;

  transform:scale(1.08);
  will-change:transform;
}

/* Motion only if animations allowed */
@media (prefers-reduced-motion:no-preference){

  .scene-img{
    animation:ken 28s ease-in-out infinite;
  }

}

@keyframes ken{

  0%,100%{
    transform:scale(1.08) translate(0,0);
  }

  33%{
    transform:scale(1.12) translate(-10px,-5px);
  }

  66%{
    transform:scale(1.10) translate(6px,-8px);
  }

}

.scene-grade{
  position:absolute;
  inset:0;

  background:

    radial-gradient(
      ellipse 100% 50% at 50% 0%,
      rgba(0,25,10,.55) 0%,
      transparent 70%
    ),

    radial-gradient(
      ellipse 60% 90% at 0% 50%,
      rgba(4,18,10,.65) 0%,
      transparent 55%
    ),

    linear-gradient(
      180deg,
      rgba(4,18,10,.10) 0%,
      rgba(4,18,10,.80) 100%
    );

  pointer-events:none;
}

/* ======================================================
   APP WRAPPER
====================================================== */

.app{
  width:100%;
  max-width:430px;
  margin:0 auto;
  padding:env(safe-area-inset-top) 18px env(safe-area-inset-bottom);
  position:relative;
  z-index:5;
}

/* ======================================================
   MACAW — identical position to loader macaw
====================================================== */

.macaw-overlay{
  position:fixed;
  left:-32px;
  top:22%;
  width:165px;
  z-index:12;
  pointer-events:none;
  will-change:transform;
  filter:drop-shadow(0 0 34px rgba(10,40,20,0.5));
}

@media (prefers-reduced-motion:no-preference){
  .macaw-overlay{
    animation:macawFloat 17s ease-in-out infinite;
  }
}

/* ======================================================
   LEAVES
====================================================== */

.leaf{
  position:fixed;
  top:-10vh;
  font-size:24px;
  opacity:0.60;
  pointer-events:none;
  z-index:1;
}

.leaf1{ left:8%; }
.leaf2{ left:72%; }
.leaf3{ left:45%; }

/* ======================================================
   ORBS
====================================================== */

.orb{
  position:fixed;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  z-index:1;
  pointer-events:none;
}

.orb1{ width:100px; height:100px; top:15%; left:-40px; }
.orb2{ width:90px;  height:90px;  top:50%; right:-35px; }
.orb3{ width:70px;  height:70px;  bottom:5%; left:20%; }

/* ======================================================
   KEYFRAMES (live app)
====================================================== */

@keyframes macawEntrance{
  0%{
    opacity:0;
    transform:translateX(-60px) rotate(-15deg);
  }
  100%{
    opacity:1;
    transform:translateX(0px) rotate(0deg);
  }
}

@keyframes macawFloat{
  0%  { transform:translateY(0px)  rotate(0deg); }
  25% { transform:translateY(-8px) rotate(-1deg); }
  50% { transform:translateY(5px)  rotate(1deg); }
  75% { transform:translateY(-5px) rotate(-0.5deg); }
  100%{ transform:translateY(0px)  rotate(0deg); }
}

@keyframes leafFall{
  0%  { transform:translate3d(0,-10vh,0)   rotate(0deg); }
  100%{ transform:translate3d(-10px,120vh,0) rotate(360deg); }
}

@keyframes orbMove1{
  0%  { transform:translate(0px,0px); }
  25% { transform:translate(30px,40px); }
  50% { transform:translate(70px,-20px); }
  75% { transform:translate(20px,30px); }
  100%{ transform:translate(0px,0px); }
}

@keyframes orbMove2{
  0%  { transform:translate(0px,0px); }
  25% { transform:translate(-50px,30px); }
  50% { transform:translate(-20px,-40px); }
  75% { transform:translate(-60px,10px); }
  100%{ transform:translate(0px,0px); }
}

@keyframes orbMove3{
  0%  { transform:translate(0px,0px); }
  25% { transform:translate(40px,-30px); }
  50% { transform:translate(-30px,-50px); }
  75% { transform:translate(20px,20px); }
  100%{ transform:translate(0px,0px); }
}

@keyframes textReveal{
  0%  { opacity:0; transform:translateY(25px) scale(0.96); }
  100%{ opacity:1; transform:translateY(0px)  scale(1); }
}

@keyframes cardReveal{
  0%  { opacity:0; transform:translateY(40px); }
  100%{ opacity:1; transform:translateY(0px); }
}

@keyframes buttonGlow{
  0%  { box-shadow:0 0 0px  rgba(255,255,255,0); }
  50% { box-shadow:0 0 22px rgba(255,255,255,0.20); }
  100%{ box-shadow:0 0 0px  rgba(255,255,255,0); }
}

@keyframes pulse{
  0%  { transform:scale(1); }
  50% { transform:scale(1.05); }
  100%{ transform:scale(1); }
}

/* ======================================================
   REDUCED MOTION — live page animations
====================================================== */

@media (prefers-reduced-motion:no-preference){

  .macaw-overlay{
    animation:
    macawEntrance 1.4s cubic-bezier(0.22,1,0.36,1) forwards,
    macawFloat 17s ease-in-out infinite 1.5s;
  }

  .leaf{ animation-name:leafFall; animation-timing-function:linear; animation-iteration-count:infinite; }
  .leaf1{ animation-duration:12s; }
  .leaf2{ animation-duration:16s; animation-delay:2s; }
  .leaf3{ animation-duration:20s; animation-delay:4s; }

  .orb1{ animation:orbMove1 18s ease-in-out infinite; }
  .orb2{ animation:orbMove2 22s ease-in-out infinite; }
  .orb3{ animation:orbMove3 26s ease-in-out infinite; }

  .top-logo  { animation:pulse 4s ease-in-out infinite; }
  .hero-title{ animation:pulse 5s ease-in-out infinite, textReveal 1.2s ease; }

  button{ animation:buttonGlow 3s infinite, textReveal 1.8s ease; }

}

/* ======================================================
   LOGO
====================================================== */

.top-logo{
  width:120px;
  margin:0 auto;
  margin-top:4px;
  margin-bottom:-10px;
}

/* ======================================================
   HERO
====================================================== */

.hero{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  margin-top:-8px;
  margin-bottom:-10px;
}

.hero-title{
  width:100%;
  max-width:360px;
  filter:drop-shadow(0 10px 25px rgba(0,0,0,0.45));
}

/* ======================================================
   GLASS CARD
====================================================== */

.glass-card{
  width:100%;
  margin-top:8px;
  padding:24px 18px;
  border-radius:34px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:0 12px 40px rgba(0,0,0,0.20);
  animation:cardReveal 1.2s ease;
}

.card-title{
  text-align:center;
  font-size:28px;
  margin-bottom:12px;
}

.card-subtitle{
  text-align:center;
  line-height:1.7;
  font-size:15px;
  margin-bottom:24px;
}

/* ======================================================
   INPUT
====================================================== */

.input-group{
  position:relative;
  margin-bottom:18px;
  animation:textReveal 1.4s ease;
}

.input-icon{
  position:absolute;
  top:24px;
  left:18px;
  transform:translateY(-50%);
}

input{
  width:100%;
  border:none;
  outline:none;
  border-radius:22px;
  padding:18px 18px 18px 52px;
  background:rgba(255,255,255,0.14);
  color:white;
  font-size:16px;
  backdrop-filter:blur(8px);
  transition:0.25s ease;
}

input::placeholder{ color:rgba(255,255,255,0.75); }

input:focus{
  background:rgba(255,255,255,0.20);
  transform:scale(1.01);
}

/* ======================================================
   DIGIT PROGRESS
====================================================== */

.digit-progress{
  width:100%;
  height:8px;
  margin-top:10px;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,0.12);
}

.digit-fill{
  width:0%;
  height:100%;
  border-radius:999px;
  transition:0.2s ease;
  background:linear-gradient(90deg,#7dff8f,#d8ffe1);
}

.digit-count{
  margin-top:6px;
  text-align:right;
  font-size:12px;
  opacity:0.75;
}

/* ======================================================
   BUTTON
====================================================== */

button{
  width:100%;
  border:none;
  border-radius:24px;
  padding:18px;
  background:linear-gradient(135deg,rgba(255,255,255,0.25),rgba(255,255,255,0.14));
  color:white;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  backdrop-filter:blur(8px);
  transition:0.25s ease;
}

button:active{ transform:scale(0.98); }
button:disabled{ opacity:0.7; cursor:not-allowed; }

/* ======================================================
   OFFLINE WARNING
====================================================== */

.offline-warning{
  display:none;
  margin-top:14px;
  padding:14px;
  border-radius:18px;
  background:rgba(255,120,120,0.16);
  border:1px solid rgba(255,120,120,0.25);
  text-align:center;
  font-size:14px;
  color:#ffe3e3;
}

/* ======================================================
   LOADING
====================================================== */

.loading-container{
  display:none;
  margin-top:24px;
  animation:textReveal 0.5s ease;
}

.loading-text{
  text-align:center;
  margin-bottom:12px;
  font-size:15px;
}

.progress-bar{
  width:100%;
  height:14px;
  background:rgba(255,255,255,0.12);
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  width:0%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#6eff8f,#c2ffcf);
  transition:width 0.25s linear;
}

/* ======================================================
   RESULTS
====================================================== */

.results{ margin-top:24px; }

.student-card{
  position:relative;
  background:rgba(255,255,255,0.12);
  border:2px dashed rgba(255,255,255,0.22);
  border-radius:28px;
  padding:20px;
  margin-bottom:22px;
  backdrop-filter:blur(10px);
  animation:cardReveal 0.5s ease;
  overflow:hidden;
}

.student-card::before,
.student-card::after{
  content:"";
  position:absolute;
  width:34px;
  height:34px;
  background:#000;
  border-radius:50%;
  top:50%;
  transform:translateY(-50%);
}

.student-card::before{ left:-17px; }
.student-card::after{ right:-17px; }

.student-name{
  font-size:24px;
  margin-bottom:14px;
  text-align:center;
}

.ticket-divider{
  width:100%;
  border-top:2px dashed rgba(255,255,255,0.20);
  margin:16px 0;
}

.info-box{
  background:rgba(255,255,255,0.10);
  border-radius:18px;
  padding:14px;
  margin-bottom:10px;
}

.info-label{
  font-size:12px;
  opacity:0.80;
  margin-bottom:4px;
}

.info-value{
  font-size:18px;
  font-weight:600;
}

.share-btn{
  margin-top:14px;
  font-size:15px;
}

/* ======================================================
   ERROR
====================================================== */

.error{
  text-align:center;
  margin-top:18px;
  color:#ffd7d7;
}

/* ======================================================
   FOOTER
====================================================== */

.footer{
  margin-top:36px;
  margin-bottom:30px;
  text-align:center;
  animation:textReveal 2s ease;
}

.footer-text{
  font-size:14px;
  line-height:1.7;
  margin-bottom:18px;
}

.footer-logo{
  display:flex;
  justify-content:center;
}

.footer-logo img{ width:120px; }

/* ======================================================
   TOUCH STARS
====================================================== */

.touch-star{
  position:fixed;
  width:10px;
  height:10px;
  pointer-events:none;
  z-index:9999;
  opacity:0;
}

.touch-star::before{
  content:"✦";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:12px;
  text-shadow:0 0 6px rgba(255,255,255,0.9), 0 0 12px rgba(255,255,255,0.7), 0 0 18px rgba(255,255,255,0.5);
}

@keyframes touchStarAnim{
  0%  { opacity:0; transform:translate(-50%,-50%) scale(0.2) rotate(0deg); }
  20% { opacity:1; transform:translate(-50%,-50%) scale(1.4) rotate(90deg); }
  60% { opacity:0.85; transform:translate(calc(-50% + var(--drift-x)),calc(-50% + var(--drift-y))) scale(0.9) rotate(220deg); }
  100%{ opacity:0; transform:translate(calc(-50% + (var(--drift-x) * 1.8)),calc(-50% + (var(--drift-y) * 1.8))) scale(0.2) rotate(360deg); }
}

/* ======================================================
   REDUCED MOTION — global off switch
====================================================== */

@media (prefers-reduced-motion:reduce){
  *{ animation:none !important; transition:none !important; }
}

</style>
</head>

<body>

<!-- ======================================================
     LOADER SCREEN
====================================================== -->

<div class="loader-screen" id="loaderScreen">

  <div class="loader-glow"></div>

  <div class="loader-orb loader-orb-1"></div>
  <div class="loader-orb loader-orb-2"></div>
  <div class="loader-orb loader-orb-3"></div>

  <div class="loader-leaf loader-leaf-1">🌿</div>
  <div class="loader-leaf loader-leaf-2">🍃</div>
  <div class="loader-leaf loader-leaf-3">🌱</div>

  <!-- MACAW — left edge, partially off-canvas -->
  <img
    src="./ChatGPT Image May 12, 2026, 02_00_29 PM (1).png"
    class="loader-macaw"
    draggable="false"
  >

  <div class="loader-column">

    <img
      src="https://ci3.googleusercontent.com/mail-sig/AIorK4zgCzgfj7mV4jDsEo9FA5FmwI06SwLkAVgJCEq7bIl3YhJP7b3nWRiK7P6-SZF-rvpXWiy5olswOQwI"
      class="loader-logo"
      draggable="false"
    >

    <img
      src="./Layer 2.png"
      class="loader-hero"
      draggable="false"
    >

    <div class="loader-card">

      <div class="loader-bar loader-title-bar"></div>
      <div class="loader-bar loader-subtitle-bar"></div>
      <div class="loader-bar loader-subtitle-bar short"></div>
      <div class="loader-input-skel"></div>
      <div class="loader-button-skel"></div>

    </div>

    <div class="loader-footer">

      <div class="loader-footer-bar"></div>
      <div class="loader-footer-bar short"></div>

      <img
        src="https://chop.imgix.net/production/e84dfb1c-17d8-4cef-ab61-ee25b808e2df/logo/1584669001294.png"
        class="loader-footer-logo"
        draggable="false"
      >

    </div>

  </div>

</div>

<!-- ======================================================
     REAL APP  ← fades in as loader fades out
====================================================== -->

<div class="real-app" id="realApp">

<div class="scene">
  <div class="scene-img"></div>
  <div class="scene-grade"></div>
</div>
  <div class="leaf leaf1">🌿</div>
  <div class="leaf leaf2">🍃</div>
  <div class="leaf leaf3">🌱</div>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- MACAW — exact same position as loader macaw for seamless dissolve -->
  <img
    src="./ChatGPT Image May 12, 2026, 02_00_29 PM (1).png"
    class="macaw-overlay"
    alt="Macaw"
    draggable="false"
  />

  <div class="app">

    <img
      src="https://ci3.googleusercontent.com/mail-sig/AIorK4zgCzgfj7mV4jDsEo9FA5FmwI06SwLkAVgJCEq7bIl3YhJP7b3nWRiK7P6-SZF-rvpXWiy5olswOQwI"
      class="top-logo"
      alt="Top Logo"
      draggable="false"
    >

    <section class="hero">
      <img
        src="./Layer 2.png"
        class="hero-title"
        alt="Rainforest Falls"
        draggable="false"
      >
    </section>

    <div class="glass-card">

      <div class="card-title">👋 Welcome Parent</div>

      <div class="card-subtitle">
        Enter the Phone Number According to the Registration Form
      </div>

      <div class="input-group">

        <div class="input-icon">📞</div>

        <input
          type="tel"
          inputmode="numeric"
          autocomplete="tel"
          id="phone"
          placeholder="Phone Number"
          maxlength="10"
          aria-label="Phone number (10 digits)"
        >

        <div class="digit-progress">
          <div class="digit-fill" id="digitFill"></div>
        </div>

        <div class="digit-count" id="digitCount">0 / 10 digits</div>

      </div>

      <button id="searchButton">🌴 Search 🌴</button>

      <div class="offline-warning" id="offlineWarning">
        ⚠️ You appear to be offline. Please check your internet connection.
      </div>

      <div class="loading-container" id="loadingContainer">
        <div class="loading-text" id="loadingText">🌿 Searching the rainforest...</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="error" id="error" role="status" aria-live="polite"></div>

      <div class="results" id="results" role="region" aria-label="Search results" aria-live="polite"></div>

    </div>

    <div class="footer">
      <div class="footer-text">
        🌿 Rainforest Falls Kids Carnival ✨<br>
        Adventure, friendship & unforgettable memories 💚
      </div>
      <div class="footer-logo">
        <img
          src="https://chop.imgix.net/production/e84dfb1c-17d8-4cef-ab61-ee25b808e2df/logo/1584669001294.png"
          alt="Footer Logo"
          draggable="false"
        >
      </div>
    </div>

  </div>

</div>

<script>

/* ======================================================
   CINEMATIC LOADER TRANSITION
====================================================== */

window.addEventListener("load", () => {

  const loader = document.getElementById("loaderScreen");
  const app    = document.getElementById("realApp");

  setTimeout(() => {

    loader.classList.add("hidden");
    app.classList.add("visible");

    /* Auto-focus input after app is visible */
    setTimeout(() => {
      document.getElementById("phone").focus();
    }, 900);

  }, 700);

});

/* ======================================================
   IMAGE PROTECTION
====================================================== */

document.addEventListener("contextmenu", (e) => {
  if(e.target.tagName === "IMG") e.preventDefault();
});

document.addEventListener("dragstart", (e) => {
  if(e.target.tagName === "IMG") e.preventDefault();
});

/* ======================================================
   GOOGLE SHEET API
====================================================== */

const SHEET_URL =
"https://script.google.com/macros/s/AKfycbz9g9Y2FGPw88OGdxuyCAurCaZNM-iShkSGvpXlhYzRowzg_pcH1BIe6aZjiRQ3XZSbOA/exec";

/* ======================================================
   EMOJIS
====================================================== */

const rainforestEmojis = [
  "🦜","🐒","🦋","🌿","🐸",
  "🍃","🦎","🌺","🐯","🪴",
  "🦁","🌈","🐍","🦚"
];

function randomEmoji(){
  return rainforestEmojis[Math.floor(Math.random() * rainforestEmojis.length)];
}

/* ======================================================
   SEARCH STATE
====================================================== */

let isSearching = false;
let lastSearchTime = 0;
const SEARCH_COOLDOWN = 1500;

/* ======================================================
   INPUT FILTER
====================================================== */

document.getElementById("phone").addEventListener("input", function(){

  this.value = this.value.replace(/[^0-9]/g, "");

  document.getElementById("error").innerHTML = "";

  const length = this.value.length;

  document.getElementById("digitCount").innerHTML = `${length} / 10 digits`;
  document.getElementById("digitFill").style.width = `${length * 10}%`;

});

/* ======================================================
   ONLINE STATUS
====================================================== */

function updateOnlineStatus(){
  const warning = document.getElementById("offlineWarning");
  warning.style.display = navigator.onLine ? "none" : "block";
}

window.addEventListener("online",  updateOnlineStatus);
window.addEventListener("offline", updateOnlineStatus);
updateOnlineStatus();

/* ======================================================
   SEARCH FUNCTION
====================================================== */

async function searchStudents(){

  const now = Date.now();

  if(now - lastSearchTime < SEARCH_COOLDOWN){
    document.getElementById("error").innerHTML = "⏳ Please wait a moment before searching again.";
    return;
  }

  lastSearchTime = now;

  if(isSearching) return;

  isSearching = true;

  const button = document.getElementById("searchButton");
  button.disabled = true;

  const phone = document.getElementById("phone").value.trim();

  if(!/^[0-9]{10}$/.test(phone)){
    document.getElementById("error").innerHTML = "⚠️ Please enter a valid 10-digit phone number.";
    button.disabled = false;
    isSearching = false;
    return;
  }

  const loadingContainer = document.getElementById("loadingContainer");
  const progressFill     = document.getElementById("progressFill");
  const loadingText      = document.getElementById("loadingText");
  const error            = document.getElementById("error");
  const results          = document.getElementById("results");

  if(!navigator.onLine){
    error.innerHTML = "⚠️ No internet connection detected.";
    button.disabled = false;
    isSearching = false;
    return;
  }

  loadingContainer.style.display = "block";
  progressFill.style.width = "0%";
  error.innerHTML = "";
  results.innerHTML = "";

  let progress = 0;

  const loadingMessages = [
    "🌿 Searching the rainforest...",
    "🦜 Calling the jungle guides...",
    "🍃 Looking for your campers...",
    "🐒 Exploring the waterfall trails...",
    "🌈 Almost there..."
  ];

  let messageIndex = 0;

  const interval = setInterval(() => {

    progress += 8;
    if(progress > 92) progress = 92;

    progressFill.style.width = progress + "%";

    if(progress % 20 === 0 && loadingMessages[++messageIndex]){
      loadingText.innerHTML = loadingMessages[messageIndex];
    }

  }, 180);

  try{

    const fetchTimeout = new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Request timed out")), 15000)
    );

    const response = await Promise.race([
      fetch(
        `${SHEET_URL}?phone=${encodeURIComponent(phone)}&t=${Date.now()}`,
        { method:"GET", redirect:"follow", credentials:"omit" }
      ),
      fetchTimeout
    ]);

    if(!response.ok) throw new Error("Network response failed");

    const data = await response.json();

    progressFill.style.width = "100%";

    results.innerHTML = "";

    if(data.length === 0){
      error.innerHTML = "🌧️ No entries were found with this phone number.";
      return;
    }

    data.forEach(student => {

      const card = document.createElement("div");
      card.className = "student-card";

      card.innerHTML = `
        <div class="student-name">${randomEmoji()} ${student.NAME}</div>
        <div class="ticket-divider"></div>
        <div class="info-box">
          <div class="info-label">🚩 TEAM NAME</div>
          <div class="info-value">${student.TEAM}</div>
        </div>
        <div class="info-box">
          <div class="info-label">👥 CREW NO.</div>
          <div class="info-value">${student.CREW}</div>
        </div>
        <div class="info-box">
          <div class="info-label">🎤 LEADER</div>
          <div class="info-value">${student.LEADER}</div>
        </div>
        <div class="info-box">
          <div class="info-label">🚌 PICKUP AT</div>
          <div class="info-value">${student.PICKUP}</div>
        </div>

        <button
          class="share-btn"
          onclick="shareStudentCard(this)"
        >
          📤 Share Ticket
        </button>

      `;

      results.appendChild(card);

    });

    const resetButton = document.createElement("button");
    resetButton.innerHTML = "🔍 Search Again";
    resetButton.style.marginTop = "12px";

    resetButton.addEventListener("click", () => {
      results.innerHTML = "";
      document.getElementById("phone").value = "";
      document.getElementById("digitFill").style.width = "0%";
      document.getElementById("digitCount").innerHTML = "0 / 10 digits";
      document.getElementById("phone").focus();
    });

    results.appendChild(resetButton);

    celebrate();

    if(navigator.vibrate) navigator.vibrate(200);

  }

  catch(err){

    console.error(err);
    error.innerHTML = "🌧️ Lost connection to the rainforest trails. Please try again.";

  }

  finally{

    clearInterval(interval);

    setTimeout(() => {
      loadingContainer.style.display = "none";
      button.disabled = false;
      isSearching = false;
    }, 500);

  }

}

/* ======================================================
   SHARE FUNCTION
====================================================== */

async function shareStudentCard(button){

  const card = button.closest(".student-card");
  const text = card.innerText;

  try{

    if(navigator.share){

      await navigator.share({
        title:"Rainforest Falls Ticket",
        text:text
      });

    }
    else{

      await navigator.clipboard.writeText(text);
      alert("Ticket copied to clipboard!");

    }

  }
  catch(err){
    console.error(err);
  }

}

/* ======================================================
   BUTTON & ENTER KEY
====================================================== */

document.getElementById("searchButton").addEventListener("click", searchStudents);

document.getElementById("phone").addEventListener("keydown", function(event){
  if(event.key === "Enter") searchStudents();
});

/* ======================================================
   TOUCH STARS
====================================================== */

let activeStars = 0;
const MAX_STARS = 35;

function createTouchStar(x, y){

  if(activeStars >= MAX_STARS) return;
  activeStars++;

  const star = document.createElement("div");
  star.className = "touch-star";
  star.style.left = x + "px";
  star.style.top  = y + "px";

  const driftX = (Math.random() * 50 - 25) + "px";
  const driftY = (Math.random() * 50 - 25) + "px";

  star.style.setProperty("--drift-x", driftX);
  star.style.setProperty("--drift-y", driftY);

  const duration = 700 + Math.random() * 500;
  star.style.animation = `touchStarAnim ${duration}ms ease-out forwards`;

  document.body.appendChild(star);

  setTimeout(() => {
    star.remove();
    activeStars--;
  }, duration + 100);

}

let lastTouchTime = 0;

document.addEventListener("touchmove", (e) => {
  const now = Date.now();
  if(now - lastTouchTime < 50) return;
  lastTouchTime = now;
  const touch = e.touches[0];
  for(let i = 0; i < 2; i++){
    createTouchStar(
      touch.clientX + (Math.random() * 18 - 9),
      touch.clientY + (Math.random() * 18 - 9)
    );
  }
}, { passive:true });

let lastMouseTime = 0;

document.addEventListener("mousemove", (e) => {
  const now = Date.now();
  if(now - lastMouseTime < 50) return;
  lastMouseTime = now;
  createTouchStar(e.clientX, e.clientY);
});

/* ======================================================
   CELEBRATION
====================================================== */

function celebrate(){

  const emojis = ["✨","🌿","🍃","🦋","🌈"];

  const centerX = window.innerWidth  / 2;
  const centerY = window.innerHeight * 0.42;

  const fragment = document.createDocumentFragment();

  for(let i = 0; i < 18; i++){

    const particle = document.createElement("div");

    particle.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

    Object.assign(particle.style, {
      position:   "fixed",
      left:       centerX + "px",
      top:        centerY + "px",
      fontSize:   (18 + Math.random() * 10) + "px",
      pointerEvents: "none",
      zIndex:     "9999",
      opacity:    "0",
      transition: "transform 2.8s cubic-bezier(0.22,1,0.36,1), opacity 2.8s ease"
    });

    fragment.appendChild(particle);

    const angle    = Math.random() * Math.PI * 2;
    const distance = 80 + Math.random() * 140;
    const x = Math.cos(angle) * distance;
    const y = Math.sin(angle) * distance;

    setTimeout(() => {
      document.body.appendChild(particle);
      requestAnimationFrame(() => {
        particle.style.opacity   = "1";
        particle.style.transform = `translate(${x}px,${y}px) scale(1.4) rotate(${Math.random()*120-60}deg)`;
      });
    }, i * 30);

    setTimeout(() => {
      particle.style.opacity   = "0";
      particle.style.transform += " scale(0.6)";
    }, 1800);

    setTimeout(() => particle.remove(), 3000);

  }

}

</script>

</body>
</html>
