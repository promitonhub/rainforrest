<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>RAINFOREST FALLS 🌿</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      width:100%;
      overflow-x:hidden;
      scroll-behavior:smooth;
      -webkit-text-size-adjust:100%;
    }

    body{

      width:100%;
      min-height:100vh;

      overflow-x:hidden;
      overflow-y:auto;

      position:relative;

      font-family:'Fredoka', sans-serif;

      color:white;

      background:#000;

      background-attachment:fixed;

      -webkit-overflow-scrolling:touch;

      text-shadow:
      0 2px 12px rgba(0,0,0,0.40);
    }

    img{
      display:block;
      max-width:100%;
    }

    /* =========================================================
       BACKGROUND
       ========================================================= */

    .bg-image{

      position:fixed;
      inset:0;

      width:100vw;
      height:100lvh;

      background-image:
      url('https://lh3.googleusercontent.com/d/1wlFgIEOZX_cAw480D_DeZwt1XyHopqV0=w2000');

      background-size:cover;
      background-position:center center;
      background-repeat:no-repeat;

      z-index:-30;

      pointer-events:none;

      transform:
      translate3d(0,0,0);

      will-change:transform;
    }

    .bg-overlay{

      position:fixed;
      inset:0;

      width:100%;
      height:100lvh;

      background:
      linear-gradient(
        to bottom,
        rgba(0,0,0,0.08),
        rgba(0,0,0,0.50)
      );

      z-index:-29;

      pointer-events:none;
    }

    /* =========================================================
       SUNLIGHT RAYS
       ========================================================= */

    .sun-rays{

      position:fixed;
      inset:0;

      overflow:hidden;

      pointer-events:none;

      z-index:-10;
    }

    .ray{

      position:absolute;

      top:-20%;

      width:180px;
      height:160vh;

      opacity:0.10;

      filter:blur(10px);

      transform-origin:top center;

      background:
      linear-gradient(
        to bottom,
        rgba(255,255,210,0.22),
        rgba(255,255,255,0.02)
      );

      mix-blend-mode:screen;
    }

    .ray1{
      left:8%;
      transform:rotate(8deg);
      animation:rayMove1 14s ease-in-out infinite;
    }

    .ray2{
      left:34%;
      width:240px;
      opacity:0.08;
      transform:rotate(-6deg);
      animation:rayMove2 18s ease-in-out infinite;
    }

    .ray3{
      right:18%;
      width:220px;
      opacity:0.07;
      transform:rotate(12deg);
      animation:rayMove3 20s ease-in-out infinite;
    }

    .ray4{
      right:-2%;
      width:160px;
      opacity:0.06;
      transform:rotate(-10deg);
      animation:rayMove4 16s ease-in-out infinite;
    }

    @keyframes rayMove1{

      0%{
        transform:
        translateX(0px)
        rotate(8deg)
        scaleY(1);
      }

      50%{
        transform:
        translateX(20px)
        rotate(10deg)
        scaleY(1.04);
      }

      100%{
        transform:
        translateX(0px)
        rotate(8deg)
        scaleY(1);
      }
    }

    @keyframes rayMove2{

      0%{
        transform:
        translateX(0px)
        rotate(-6deg);
      }

      50%{
        transform:
        translateX(-18px)
        rotate(-8deg);
      }

      100%{
        transform:
        translateX(0px)
        rotate(-6deg);
      }
    }

    @keyframes rayMove3{

      0%{
        transform:
        translateX(0px)
        rotate(12deg);
      }

      50%{
        transform:
        translateX(14px)
        rotate(15deg);
      }

      100%{
        transform:
        translateX(0px)
        rotate(12deg);
      }
    }

    @keyframes rayMove4{

      0%{
        transform:
        translateX(0px)
        rotate(-10deg);
      }

      50%{
        transform:
        translateX(-12px)
        rotate(-13deg);
      }

      100%{
        transform:
        translateX(0px)
        rotate(-10deg);
      }
    }

    /* =========================================================
       LEAVES
       ========================================================= */

    .leaf{

      position:fixed;
      top:-10vh;

      font-size:24px;

      opacity:0.60;

      pointer-events:none;

      z-index:1;

      animation-name:leafFall;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
    }

    .leaf1{
      left:8%;
      animation-duration:13s;
      animation-delay:0s;
    }

    .leaf2{
      left:72%;
      animation-duration:17s;
      animation-delay:2s;
    }

    .leaf3{
      left:45%;
      animation-duration:21s;
      animation-delay:5s;
    }

    @keyframes leafFall{

      0%{
        transform:
          translate3d(0,-10vh,0)
          rotate(0deg)
          scale(1);

        opacity:0;
      }

      10%{
        opacity:0.65;
      }

      20%{
        transform:
          translate3d(25px,15vh,0)
          rotate(80deg)
          scale(1.02);
      }

      40%{
        transform:
          translate3d(-35px,38vh,0)
          rotate(160deg)
          scale(0.96);
      }

      60%{
        transform:
          translate3d(40px,62vh,0)
          rotate(240deg)
          scale(1.04);
      }

      80%{
        transform:
          translate3d(-28px,88vh,0)
          rotate(320deg)
          scale(0.98);
      }

      100%{
        transform:
          translate3d(18px,120vh,0)
          rotate(400deg)
          scale(1);

        opacity:0;
      }
    }

    /* =========================================================
       BUBBLES
       ========================================================= */

    .bubble{

      position:fixed;

      border-radius:50%;

      pointer-events:none;

      z-index:1;

      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);

      background:
      radial-gradient(
        circle at 30% 30%,
        rgba(255,255,255,0.45),
        rgba(255,255,255,0.08)
      );

      border:
      1px solid rgba(255,255,255,0.14);

      box-shadow:
        inset 0 0 12px rgba(255,255,255,0.24),
        0 0 18px rgba(255,255,255,0.08);

      opacity:0;

      will-change:
      transform,
      opacity;
    }

    @keyframes bubbleFloat{

      0%{
        transform:
          translate3d(0,0,0)
          scale(0.7);

        opacity:0;
      }

      10%{
        opacity:0.9;
      }

      50%{
        transform:
          translate3d(
            calc(var(--drift) * 0.5),
            -40vh,
            0
          )
          scale(1);
      }

      100%{
        transform:
          translate3d(
            var(--drift),
            -90vh,
            0
          )
          scale(1.15);

        opacity:0.85;
      }
    }

    @keyframes bubblePop{

      0%{
        transform:scale(1);
        opacity:1;
      }

      40%{
        transform:scale(1.25);
        opacity:0.95;
      }

      100%{
        transform:scale(1.9);
        opacity:0;
      }
    }

    /* =========================================================
       APP
       ========================================================= */

    .app{

      width:100%;
      max-width:430px;

      margin:0 auto;

      padding:
      env(safe-area-inset-top)
      18px
      env(safe-area-inset-bottom);

      position:relative;
      z-index:5;
    }

    .top-logo{

      width:120px;

      margin:0 auto;

      margin-top:4px;
      margin-bottom:-10px;
    }

    .hero{

      display:flex;
      justify-content:center;
      align-items:center;

      margin-top:-8px;
      margin-bottom:-10px;
    }

    .hero-title{

      width:100%;
      max-width:360px;

      filter:
      drop-shadow(0 10px 25px rgba(0,0,0,0.45));
    }

    .glass-card{

      width:100%;

      margin-top:8px;

      padding:24px 18px;

      border-radius:34px;

      background:
      rgba(255,255,255,0.12);

      border:
      1px solid rgba(255,255,255,0.18);

      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);

      box-shadow:
      0 12px 40px rgba(0,0,0,0.20);
    }

    .card-title{
      text-align:center;
      font-size:28px;
      margin-bottom:12px;
    }

    .card-subtitle{
      text-align:center;
      line-height:1.7;
      font-size:15px;
      margin-bottom:24px;
    }

    .input-group{

      position:relative;

      margin-bottom:18px;
    }

    .input-icon{

      position:absolute;

      top:50%;
      left:18px;

      transform:translateY(-50%);
    }

    input{

      width:100%;

      border:none;
      outline:none;

      border-radius:22px;

      padding:
      18px
      18px
      18px
      52px;

      background:
      rgba(255,255,255,0.14);

      color:white;

      font-size:16px;

      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    input::placeholder{
      color:rgba(255,255,255,0.75);
    }

    button{

      width:100%;

      border:none;

      border-radius:24px;

      padding:18px;

      background:
      linear-gradient(
        135deg,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.14)
      );

      color:white;

      font-size:18px;
      font-weight:700;

      cursor:pointer;

      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .footer{

      margin-top:36px;
      margin-bottom:30px;

      text-align:center;
    }

    .footer-text{
      font-size:14px;
      line-height:1.7;
      margin-bottom:18px;
    }

    .footer-logo{
      display:flex;
      justify-content:center;
    }

    .footer-logo img{
      width:120px;
    }

  </style>

</head>

<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <!-- SUNLIGHT RAYS -->
  <div class="sun-rays">

    <div class="ray ray1"></div>
    <div class="ray ray2"></div>
    <div class="ray ray3"></div>
    <div class="ray ray4"></div>

  </div>

  <!-- LEAVES -->
  <div class="leaf leaf1">🌿</div>
  <div class="leaf leaf2">🍃</div>
  <div class="leaf leaf3">🌱</div>

  <div class="app">

    <img
      src="https://ci3.googleusercontent.com/mail-sig/AIorK4zgCzgfj7mV4jDsEo9FA5FmwI06SwLkAVgJCEq7bIl3YhJP7b3nWRiK7P6-SZF-rvpXWiy5olswOQwI"
      class="top-logo"
      alt="Top Logo"
    >

    <section class="hero">

      <img
        src="https://lh3.googleusercontent.com/d/1220_kk_C4yBBZkoplEHs8qFWuouAdrCh"
        class="hero-title"
        alt="Rainforest Falls"
      >

    </section>

    <div class="glass-card">

      <div class="card-title">
        👋 Welcome Parent
      </div>

      <div class="card-subtitle">
        Enter your registered phone number below
      </div>

      <div class="input-group">

        <div class="input-icon">
          📞
        </div>

        <input
          type="text"
          placeholder="Phone Number"
        >

      </div>

      <button>
        🌴 Search 🌴
      </button>

    </div>

    <div class="footer">

      <div class="footer-text">
        🌿 Rainforest Falls Kids Carnival ✨<br>
        Adventure, friendship & unforgettable memories 💚
      </div>

      <div class="footer-logo">

        <img
          src="https://chop.imgix.net/production/e84dfb1c-17d8-4cef-ab61-ee25b808e2df/logo/1584669001294.png"
          alt="Footer Logo"
        >

      </div>

    </div>

  </div>

  <script>

    const activeBubbles = [];

    const MIN_BUBBLES = 7;
    const MAX_BUBBLES = 20;

    function createBubble(){

      if(activeBubbles.length >= MAX_BUBBLES){
        return;
      }

      const bubble =
      document.createElement("div");

      bubble.className = "bubble";

      /*
        BIGGER BUBBLES
      */
      const size =
      28 + Math.random() * 46;

      bubble.style.width =
      size + "px";

      bubble.style.height =
      size + "px";

      bubble.style.left =
      Math.random() * window.innerWidth + "px";

      bubble.style.top =
      (window.innerHeight + 50) + "px";

      bubble.style.setProperty(
        "--drift",
        (Math.random() * 260 - 130) + "px"
      );

      const duration =
      12 + Math.random() * 10;

      bubble.style.animation =
      `bubbleFloat ${duration}s linear forwards`;

      bubble.style.opacity =
      0.28 + Math.random() * 0.45;

      document.body.appendChild(
        bubble
      );

      activeBubbles.push(bubble);

      /*
        ALL BUBBLES POP
      */
      setTimeout(() => {

        bubble.style.animation =
        "bubblePop 0.5s ease-out forwards";

      }, duration * 1000 * 0.92);

      setTimeout(() => {

        bubble.remove();

        const index =
        activeBubbles.indexOf(bubble);

        if(index > -1){
          activeBubbles.splice(index,1);
        }

      }, duration * 1000 + 1200);
    }

    for(let i = 0; i < MIN_BUBBLES; i++){

      setTimeout(() => {

        createBubble();

      }, i * 500);
    }

    setInterval(() => {

      if(activeBubbles.length < MIN_BUBBLES){

        createBubble();

      }else if(
        activeBubbles.length < MAX_BUBBLES &&
        Math.random() > 0.65
      ){

        createBubble();
      }

    }, 1400);

  </script>

</body>
</html>
