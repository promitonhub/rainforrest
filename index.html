<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<meta
  name="theme-color"
  content="#0b0f0b"
/>

<title>RAINFOREST FALLS 🌿</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
  href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
/>

<style>

/* ======================================================
   RESET
====================================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  width:100%;
  overflow-x:hidden;
  scroll-behavior:smooth;
  -webkit-text-size-adjust:100%;
}

body{

  width:100%;
  min-height:100vh;

  overflow-x:hidden;
  overflow-y:auto;

  position:relative;

  font-family:'Fredoka',sans-serif;

  color:white;

  background:#000;

  -webkit-overflow-scrolling:touch;

  overscroll-behavior-y:contain;

  text-shadow:
  0 2px 12px rgba(0,0,0,0.40);
}

/* ======================================================
   NON SELECTABLE
====================================================== */

.top-logo,
.hero-title,
.footer-logo img,
.macaw-overlay,
button,
.student-card,
.info-box,
.card-title,
.card-subtitle,
.footer,
.leaf,
.orb,
.bg-image{

  -webkit-user-select:none;
  user-select:none;

  -webkit-touch-callout:none;

  -webkit-user-drag:none;
}

img{

  -webkit-user-select:none;
  user-select:none;

  -webkit-user-drag:none;

  pointer-events:none;
}

/* ======================================================
   BACKGROUND
====================================================== */

.bg-image{

  position:fixed;
  inset:0;

  width:100vw;
  height:100dvh;

  background-image:
  url('./ChatGppPT Image May 9, 2026, 10_52_48 PM (1).png');

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  z-index:-30;
}

.bg-overlay{

  position:fixed;
  inset:0;

  background:
  linear-gradient(
    to bottom,
    rgba(0,0,0,0.12),
    rgba(0,0,0,0.55)
  );

  z-index:-29;
}

#fireflies{

  position:fixed;
  inset:0;

  width:100%;
  height:100%;

  pointer-events:none;

  z-index:-5;
}

/* ======================================================
   APP
====================================================== */

.app{

  width:100%;
  max-width:430px;

  margin:0 auto;

  padding:
  env(safe-area-inset-top)
  18px
  env(safe-area-inset-bottom);

  position:relative;
  z-index:5;
}

/* ======================================================
   DECOR
====================================================== */

.macaw-overlay{

  position:fixed;

  left:-32px;
  top:22%;

  width:165px;

  z-index:12;

  filter:
  drop-shadow(
    0 16px 28px rgba(0,0,0,0.38)
  );
}

.leaf{

  position:fixed;

  top:-10vh;

  font-size:24px;

  opacity:0.60;

  z-index:1;
}

.leaf1{ left:8%; }
.leaf2{ left:72%; }
.leaf3{ left:45%; }

.orb{

  position:fixed;

  border-radius:50%;

  background:
  rgba(255,255,255,0.08);

  backdrop-filter:blur(12px);

  z-index:1;
}

.orb1{
  width:100px;
  height:100px;
  top:15%;
  left:-40px;
}

.orb2{
  width:90px;
  height:90px;
  top:50%;
  right:-35px;
}

.orb3{
  width:70px;
  height:70px;
  bottom:5%;
  left:20%;
}

/* ======================================================
   REDUCED MOTION
====================================================== */

@media (prefers-reduced-motion:no-preference){

  .macaw-overlay{
    animation:
    macawFloat 17s ease-in-out infinite;
  }

  .leaf{
    animation-name:leafFall;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
  }

  .leaf1{
    animation-duration:12s;
  }

  .leaf2{
    animation-duration:16s;
    animation-delay:2s;
  }

  .leaf3{
    animation-duration:20s;
    animation-delay:4s;
  }

  .orb1{
    animation:
    orbMove1 18s ease-in-out infinite;
  }

  .orb2{
    animation:
    orbMove2 22s ease-in-out infinite;
  }

  .orb3{
    animation:
    orbMove3 26s ease-in-out infinite;
  }

  .glass-card::before{
    animation:
    shimmerSweep 8s linear infinite;
  }

}

/* ======================================================
   KEYFRAMES
====================================================== */

@keyframes macawFloat{

  0%{
    transform:
    translateY(0px);
  }

  50%{
    transform:
    translateY(-10px);
  }

  100%{
    transform:
    translateY(0px);
  }
}

@keyframes leafFall{

  0%{
    transform:
    translateY(-10vh)
    rotate(0deg);
  }

  100%{
    transform:
    translateY(120vh)
    rotate(360deg);
  }
}

@keyframes orbMove1{

  0%{
    transform:translate(0,0);
  }

  50%{
    transform:translate(60px,-20px);
  }

  100%{
    transform:translate(0,0);
  }
}

@keyframes orbMove2{

  0%{
    transform:translate(0,0);
  }

  50%{
    transform:translate(-50px,20px);
  }

  100%{
    transform:translate(0,0);
  }
}

@keyframes orbMove3{

  0%{
    transform:translate(0,0);
  }

  50%{
    transform:translate(30px,-30px);
  }

  100%{
    transform:translate(0,0);
  }
}

@keyframes shimmerSweep{

  0%{
    left:-140%;
  }

  100%{
    left:180%;
  }
}

@keyframes cardReveal{

  0%{
    opacity:0;
    transform:
    translateY(30px)
    scale(0.98);
  }

  100%{
    opacity:1;
    transform:
    translateY(0px)
    scale(1);
  }
}

@keyframes touchStarAnim{

  0%{
    opacity:0;

    transform:
    translate(-50%,-50%)
    scale(0.2);
  }

  20%{
    opacity:1;

    transform:
    translate(-50%,-50%)
    scale(1.3);
  }

  100%{
    opacity:0;

    transform:
    translate(
      calc(-50% + var(--drift-x)),
      calc(-50% + var(--drift-y))
    )
    scale(0.2);
  }
}

@keyframes softErrorFlash{

  0%{
    box-shadow:0 0 0 rgba(255,0,0,0);
  }

  30%{
    box-shadow:
    0 0 0 3px rgba(255,80,80,0.18),
    0 0 24px rgba(255,80,80,0.18);
  }

  100%{
    box-shadow:0 0 0 rgba(255,0,0,0);
  }
}

/* ======================================================
   HEADER
====================================================== */

.top-logo{

  width:120px;

  margin:0 auto;

  margin-bottom:-10px;
}

.hero{

  display:flex;
  justify-content:center;
  align-items:center;

  margin-bottom:-10px;
}

.hero-title{

  width:100%;
  max-width:360px;

  drop-shadow(
    0 10px 25px rgba(0,0,0,0.45)
  );

/* ======================================================
   GLASS CARD
====================================================== */

.glass-card{

  position:relative;

  overflow:hidden;

  width:100%;

  margin-top:8px;

  padding:24px 18px;

  border-radius:34px;

  background:
  rgba(255,255,255,0.12);

  border:
  1px solid rgba(255,255,255,0.18);

  backdrop-filter:blur(12px);

  box-shadow:
  0 12px 40px rgba(0,0,0,0.20);
}

.glass-card::before{

  content:"";

  position:absolute;

  top:0;
  left:-140%;

  width:80%;
  height:100%;

  background:
  linear-gradient(
    115deg,
    transparent 0%,
    rgba(255,255,255,0.05) 35%,
    rgba(255,255,255,0.18) 50%,
    rgba(255,255,255,0.05) 65%,
    transparent 100%
  );

  transform:skewX(-20deg);

  pointer-events:none;
}

.card-title{

  text-align:center;

  font-size:28px;

  margin-bottom:12px;
}

.card-subtitle{

  text-align:center;

  line-height:1.7;

  font-size:15px;

  margin-bottom:24px;
}

/* ======================================================
   INPUT
====================================================== */

.input-group{

  position:relative;

  overflow:hidden;

  margin-bottom:18px;
}

.input-inner{
  position:relative;
}

.input-fill{

  position:absolute;

  inset:0;

  width:0%;

  border-radius:22px;

  background:
  linear-gradient(
    90deg,
    rgba(125,255,143,0.18),
    rgba(125,255,143,0.06)
  );

  transition:
  width 0.25s ease;

  pointer-events:none;
}

.input-icon{

  position:absolute;

  top:50%;
  left:18px;

  transform:translateY(-50%);

  z-index:2;
}

input{

  width:100%;

  border:none;
  outline:none;

  border-radius:22px;

  padding:
  18px
  18px
  18px
  52px;

  background:
  rgba(255,255,255,0.14);

  color:white;

  font-size:16px;

  backdrop-filter:blur(8px);

  transition:0.25s ease;

  position:relative;

  z-index:1;
}

input::placeholder{
  color:rgba(255,255,255,0.75);
}

input:focus{

  rgba(255,255,255,0.20);

  box-shadow:

  border:
  1px solid rgba(125,255,143,0.28);
}

.input-error{

}

/* ======================================================
   BUTTONS
====================================================== */

button{

  width:100%;

  border:none;

  border-radius:24px;

  padding:18px;

  background:
  linear-gradient(
    135deg,
    rgba(255,255,255,0.25),
    rgba(255,255,255,0.14)
  );

  color:white;

  font-size:18px;
  font-weight:700;

  backdrop-filter:blur(8px);

  transition:

}

button:active{

}

/* ======================================================
   OFFLINE
====================================================== */

.offline-warning{

  display:none;

  margin-top:14px;

  padding:14px;

  border-radius:18px;

  background:
  rgba(255,120,120,0.16);

  border:

  font-size:14px;

}

/* ======================================================

====================================================== */

.loading-container{

  margin-top:24px;
}

.loading-text{

  text-align:center;

  margin-bottom:12px;

}

.progress-bar{

  width:100%;
  height:14px;

  background:

  overflow:hidden;
}

.progress-fill{

  width:0%;
  height:100%;

  border-radius:999px;

  background:

  );

}

/* ======================================================
   RESULTS
====================================================== */

.results{

  margin-top:24px;

  display:flex;
  flex-direction:column;
  gap:18px;

}

.student-card{

  position:relative;

  overflow:hidden;

  scroll-snap-align:start;

  scroll-margin-top:18px;

  background:
  rgba(255,255,255,0.12);

  border:
  2px dashed rgba(255,255,255,0.22);

  border-radius:28px;

  padding:20px;

  backdrop-filter:blur(10px);

  animation:
  cardReveal 0.5s ease;

  animation-fill-mode:forwards;

  transition:
  transform 0.35s ease,
  box-shadow 0.35s ease;
}

.student-card::before{

  content:"";

  position:absolute;

  inset:0;

  border-radius:28px;

  pointer-events:none;

  border:
  1px solid rgba(255,255,255,0.08);

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,0.04),
    transparent 30%
  );
}

.student-card:active{

  transform:scale(0.985);

  box-shadow:
  0 8px 24px rgba(0,0,0,0.22);
}

.student-name{

  margin-bottom:14px;

  text-align:center;
}

.ticket-divider{

  border-top:

  16px 0;
}

.info-box{

  background:

  border-radius:18px;

  margin-bottom:10px;
}

.info-label{

  font-size:12px;

  opacity:0.80;

  margin-bottom:4px;
}

.info-value{

  font-size:18px;

  font-weight:600;
}

.share-btn{
  margin-top:14px;
  font-size:15px;
}

/* ======================================================
   ERROR
====================================================== */

.error{

  text-align:center;

  margin-top:18px;

  color:#ffd7d7;
}

/* ======================================================
   FOOTER
====================================================== */

.footer{

  margin-top:36px;
  margin-bottom:30px;

  text-align:center;
}

.footer-text{

  font-size:14px;

  line-height:1.7;

  margin-bottom:18px;
}

.footer-logo{

  display:flex;

  justify-content:center;
}

.footer-logo img{
  width:120px;
}

/* ======================================================
   TOUCH GLITTER
====================================================== */

.touch-star{

  position:fixed;

  width:10px;
  height:10px;

  pointer-events:none;

  z-index:9999;

}

.touch-star::before{

  0 0 6px rgba(255,255,255,0.9),
  0 0 12px rgba(255,255,255,0.7),
  0 0 18px rgba(255,255,255,0.5);
}

</style>

<script>

/* ======================================================
   API
====================================================== */

const SHEET_URL =
"https://script.google.com/macros/s/AKfycbz9g9Y2FGPw88OGdxuyCAurCaZNM-iShkSGvpXlhYzRowzg_pcH1BIe6aZjiRQ3XZSbOA/exec";

/* ======================================================
   SAFE HTML
====================================================== */

function safe(s){

  return String(s).replace(

    /[<>&"]/g,

    c => ({
      '<':'&lt;',
      '>':'&gt;',
      '&':'&amp;',
      '"':'&quot;'
    }[c])

  );

}

/* ======================================================
   RANDOM EMOJI
====================================================== */

const rainforestEmojis = [

  "🦜","🐒","🦋","🌿","🐸",
  "🍃","🦎","🌺","🐯","🪴",
  "🦁","🌈","🐍","🦚"

];

function randomEmoji(){

  return rainforestEmojis[
    Math.floor(
      Math.random() *
      rainforestEmojis.length
    )
  ];

}

/* ======================================================
   SEARCH STATE
====================================================== */

let isSearching = false;

let lastSearchTime = 0;

const SEARCH_COOLDOWN = 3000;

/* ======================================================
   INPUT
====================================================== */

const phoneInput =
document.getElementById("phone");

phoneInput.addEventListener(
  "input",
  function(){

    this.value =
    this.value.replace(/[^0-9]/g,"");

    document.getElementById(
      "error"
    ).innerHTML = "";

    document.getElementById(
      "inputFill"
    ).style.width =
    `${this.value.length * 10}%`;

  }
);

phoneInput.addEventListener(
  "keydown",
  function(event){

    document.getElementById(
      "error"
    ).innerHTML = "";

    if(event.key === "Enter"){
      searchStudents();
    }

  }
);

/* ======================================================
   ONLINE STATUS
====================================================== */

function updateOnlineStatus(){

  const warning =
  document.getElementById(
    "offlineWarning"
  );

  if(navigator.onLine){
    warning.style.display =
    "none";
  }

  else{
    warning.style.display =
    "block";
  }

}

window.addEventListener(
  "online",
  updateOnlineStatus
);

window.addEventListener(
  "offline",
  updateOnlineStatus
);

updateOnlineStatus();

/* ======================================================
   INPUT ERROR
====================================================== */

function triggerInputError(){

  const input =
  document.getElementById("phone");

  input.classList.remove(
    "input-error"
  );

  void input.offsetWidth;

  input.classList.add(
    "input-error"
  );

}

/* ======================================================
   SEARCH
====================================================== */

async function searchStudents(){

  const now = Date.now();

  if(
    now - lastSearchTime <
    SEARCH_COOLDOWN
  ){

    document.getElementById(
      "error"
    ).innerHTML =
    "⏳ Please wait before searching again.";

    return;
  }

  lastSearchTime = now;

  if(isSearching){
    return;
  }

  isSearching = true;

  const button =
  document.getElementById(
    "searchButton"
  );

  button.disabled = true;

  const phone =
  phoneInput.value.trim();

  const error =
  document.getElementById(
    "error"
  );

  const results =
  document.getElementById(
    "results"
  );

  const loadingContainer =
  document.getElementById(
    "loadingContainer"
  );

  const progressFill =
  document.getElementById(
    "progressFill"
  );

  const loadingText =
  document.getElementById(
    "loadingText"
  );

  if(!/^[0-9]{10}$/.test(phone)){

    triggerInputError();

    error.innerHTML =
    "⚠️ Enter a valid 10-digit number.";

    button.disabled = false;

    isSearching = false;

    return;
  }

  if(!navigator.onLine){

    triggerInputError();

    error.innerHTML =
    "⚠️ No internet connection detected.";

    button.disabled = false;

    isSearching = false;

    return;
  }

  loadingContainer.style.display =
  "block";

  progressFill.style.width =
  "0%";

  results.innerHTML = "";
  error.innerHTML = "";

  let progress = 0;

  const loadingMessages = [

    "🌿 Searching the rainforest...",
    "🦜 Calling the jungle guides...",
    "🍃 Looking for your campers...",
    "🐒 Exploring the waterfall trails...",
    "🌈 Almost there..."

  ];

  let messageIndex = 0;

  const interval = setInterval(() => {

    progress += 8;

    if(progress > 92){
      progress = 92;
    }

    progressFill.style.width =
    progress + "%";

    if(progress % 20 === 0){

      messageIndex++;

      if(
        loadingMessages[messageIndex]
      ){

        loadingText.innerHTML =
        loadingMessages[
          messageIndex
        ];

      }

    }

  },180);

  try{

    const controller =
    new AbortController();

    const timeout =
    setTimeout(() => {

      controller.abort();

    },15000);

    const response =
    await fetch(

      `${SHEET_URL}?phone=${encodeURIComponent(phone)}&t=${Date.now()}`,

      {
        signal:controller.signal
      }

    );

    clearTimeout(timeout);

    if(!response.ok){
      throw new Error();
    }

    const matchedStudents =
    await response.json();

    progressFill.style.width =
    "100%";

    if(matchedStudents.length === 0){

      triggerInputError();

      error.innerHTML =
      "🌧️ No entries found.";

      return;
    }

    matchedStudents.forEach((student,index) => {

      const card =
      document.createElement("div");

      card.className =
      "student-card";

      card.style.animationDelay =
      `${index * 120}ms`;

      card.style.opacity = "0";

      setTimeout(() => {
        card.style.opacity = "1";
      },50);

      card.innerHTML = `

        <div class="student-name">
          ${randomEmoji()} ${safe(student.NAME)}
        </div>

        <div class="ticket-divider"></div>

        <div class="info-box">

          <div class="info-label">
            🚩 TEAM NAME
          </div>

          <div class="info-value">
            ${safe(student.TEAM)}
          </div>

        </div>

        <div class="info-box">

          <div class="info-label">
            👥 CREW NO.
          </div>

          <div class="info-value">
            ${safe(student.CREW)}
          </div>

        </div>

        <div class="info-box">

          <div class="info-label">
            🎤 LEADER
          </div>

          <div class="info-value">
            ${safe(student.LEADER)}
          </div>

        </div>

        <div class="info-box">

          <div class="info-label">
            🚌 PICKUP AT
          </div>

          <div class="info-value">
            ${safe(student.PICKUP)}
          </div>

        </div>

        <button
          class="share-btn"
          onclick="shareStudentCard(this)"
        >
          📤 Share Ticket
        </button>

      `;

      results.appendChild(card);

    });

    const resetButton =
    document.createElement("button");

    resetButton.innerHTML =
    "🔍 Search Again";

    resetButton.style.marginTop =
    "12px";

    resetButton.addEventListener(
      "click",
      () => {

        results.innerHTML = "";

        phoneInput.value = "";

        document.getElementById(
          "inputFill"
        ).style.width = "0%";

        phoneInput.focus();

      }
    );

    results.appendChild(
      resetButton
    );

    celebrate();

    if(navigator.vibrate){
      navigator.vibrate(200);
    }

  }

  catch(err){

    triggerInputError();

    error.innerHTML =
    "🌧️ Lost connection to the rainforest trails.";

  }

  finally{

    clearInterval(interval);

    setTimeout(() => {

      loadingContainer.style.display =
      "none";

      button.disabled = false;

      isSearching = false;

    },500);

  }

}

/* ======================================================
   SHARE
====================================================== */

async function shareStudentCard(button){

  const card =
  button.closest(".student-card");

  const text =
  card.innerText;

  try{

    if(navigator.share){

      await navigator.share({

        title:
        "Rainforest Falls Ticket",

        text:text

      });

    }

    else{

      await navigator.clipboard.writeText(
        text
      );

      alert(
        "Ticket copied to clipboard!"
      );

    }

  }

  catch(err){

    console.error(err);

  }

}

/* ======================================================
   TOUCH GLITTER
====================================================== */

let activeStars = 0;

const MAX_STARS = 70;

function createTouchStar(x,y){

  if(activeStars >= MAX_STARS){
    return;
  }

  activeStars++;

  const star =
  document.createElement("div");

  star.className =
  "touch-star";

  star.style.left =
  x + "px";

  star.style.top =
  y + "px";

  const driftX =
  (Math.random() * 50 - 25)
  + "px";

  const driftY =
  (Math.random() * 50 - 25)
  + "px";

  star.style.setProperty(
    "--drift-x",
    driftX
  );

  star.style.setProperty(
    "--drift-y",
    driftY
  );

  const duration =
  700 + Math.random() * 500;

  star.style.animation =
  `touchStarAnim ${duration}ms ease-out forwards`;

  document.body.appendChild(star);

  setTimeout(() => {

    star.remove();

    activeStars--;

  },duration + 100);

}

let lastTouchTime = 0;

document.addEventListener(
  "touchmove",
  (e) => {

    const now = Date.now();

    if(now - lastTouchTime < 35){
      return;
    }

    lastTouchTime = now;

    const touch =
    e.touches[0];

    for(let i = 0; i < 2; i++){

      createTouchStar(

        touch.clientX +
        (Math.random() * 18 - 9),

        touch.clientY +
        (Math.random() * 18 - 9)

      );

    }

  },
  { passive:true }
);

/* ======================================================
   CONFETTI
====================================================== */

function celebrate(){

  const emojis = [
    "✨","🌿","🍃","🦋","🌈"
  ];

  const centerX =
  window.innerWidth / 2;

  const centerY =
  window.innerHeight * 0.42;

  for(let i = 0; i < 18; i++){

    const particle =
    document.createElement("div");

    particle.innerHTML =
    emojis[
      Math.floor(
        Math.random() *
        emojis.length
      )
    ];

    particle.style.position =
    "fixed";

    particle.style.left =
    centerX + "px";

    particle.style.top =
    centerY + "px";

    particle.style.fontSize =
    (18 + Math.random() * 10)
    + "px";

    particle.style.pointerEvents =
    "none";

    particle.style.zIndex =
    "9999";

    particle.style.opacity =
    "0";

    particle.style.transition =
    "transform 2.8s cubic-bezier(0.22,1,0.36,1), opacity 2.8s ease";

    document.body.appendChild(
      particle
    );

    const angle =
    Math.random() *
    Math.PI * 2;

    const distance =
    80 + Math.random() * 140;

    const x =
    Math.cos(angle) *
    distance;

    const y =
    Math.sin(angle) *
    distance;

    setTimeout(() => {

      particle.style.opacity =
      "1";

      particle.style.transform = `
        translate(${x}px, ${y}px)
        scale(1.4)
        rotate(${Math.random()*120-60}deg)
      `;

    },30);

    setTimeout(() => {

      particle.style.opacity =
      "0";

    },1800);

    setTimeout(() => {

      particle.remove();

    },3000);

  }

}

/* ======================================================
   FIREFLIES
====================================================== */

const fireflyCanvas =
document.getElementById("fireflies");

const fireflyCtx =
fireflyCanvas.getContext("2d");

let fireflies = [];

function resizeFireflies(){

  fireflyCanvas.width =
  window.innerWidth;

  fireflyCanvas.height =
  window.innerHeight;

}

window.addEventListener(
  "resize",
  resizeFireflies
);

resizeFireflies();

for(let i = 0; i < 14; i++){

  fireflies.push({

    x:
    Math.random() *
    fireflyCanvas.width,

    y:
    Math.random() *
    fireflyCanvas.height,

    r:
    1 + Math.random() * 3,

    dx:
    (Math.random() - 0.5) * 0.18,

    dy:
    (Math.random() - 0.5) * 0.18,

    pulse:
    Math.random() * Math.PI * 2,

    speed:
    0.01 + Math.random() * 0.02

  });

}

function animateFireflies(){

  fireflyCtx.clearRect(
    0,
    0,
    fireflyCanvas.width,
    fireflyCanvas.height
  );

  fireflies.forEach(f => {

    f.x += f.dx;
    f.y += f.dy;

    f.pulse += f.speed;

    if(
      f.x < -20 ||
      f.x > fireflyCanvas.width + 20
    ){
      f.dx *= -1;
    }

    if(
      f.y < -20 ||
      f.y > fireflyCanvas.height + 20
    ){
      f.dy *= -1;
    }

    const glow =
    0.45 +
    Math.sin(f.pulse) * 0.25;

    fireflyCtx.beginPath();

    fireflyCtx.arc(
      f.x,
      f.y,
      f.r,
      0,
      Math.PI * 2
    );

    fireflyCtx.fillStyle =
    `rgba(220,255,160,${glow})`;

    fireflyCtx.shadowBlur =
    18;

    fireflyCtx.shadowColor =
    "rgba(220,255,160,0.7)";

    fireflyCtx.fill();

  });

  requestAnimationFrame(
    animateFireflies
  );

}

animateFireflies();
