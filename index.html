<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>RAINFOREST FALLS 🌿</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    /* =========================================
    RESET
    ========================================= */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html{

      width:100%;

      overflow-x:hidden;

      scroll-behavior:smooth;

      -webkit-text-size-adjust:100%;
    }

    body{

      width:100%;

      min-height:100vh;

      overflow-x:hidden;

      overflow-y:auto;

      position:relative;

      font-family:'Fredoka', sans-serif;

      color:white;

      background:#000;

      background-attachment:fixed;

      -webkit-overflow-scrolling:touch;

      text-shadow:
      0 2px 12px rgba(0,0,0,0.40);
    }

    img{
      display:block;
      max-width:100%;
    }

    /* =========================================
    FIXED BACKGROUND
    ========================================= */

    .bg-image{

      position:fixed;

      inset:0;

      width:100vw;

      height:100lvh;

      background-image:
      url('https://lh3.googleusercontent.com/d/1VXu4QTjcT-9VyQxGehvKQhiG9Y6OUsgC');

      background-size:cover;

      background-position:center center;

      background-repeat:no-repeat;

      z-index:-30;

      pointer-events:none;

      transform:
      translate3d(0,0,0);

      -webkit-transform:
      translate3d(0,0,0);

      backface-visibility:hidden;

      -webkit-backface-visibility:hidden;

      will-change:transform;
    }

    .bg-overlay{

      position:fixed;

      inset:0;

      width:100%;

      height:100lvh;

      background:
      linear-gradient(
        to bottom,
        rgba(0,0,0,0.10),
        rgba(0,0,0,0.48)
      );

      z-index:-29;

      pointer-events:none;
    }

    /* =========================================
    GPU FIX
    ========================================= */

    .app,
    .glass-card,
    .hero,
    .results{

      transform:
      translateZ(0);

      -webkit-transform:
      translateZ(0);
    }

    /* =========================================
    APP
    ========================================= */

    .app{

      width:100%;

      max-width:430px;

      margin:0 auto;

      padding:
      env(safe-area-inset-top)
      18px
      env(safe-area-inset-bottom);

      position:relative;

      z-index:5;
    }

    /* =========================================
    FALLING LEAVES
    ========================================= */

    .leaf{

      position:fixed;

      top:-10vh;

      font-size:24px;

      opacity:0.60;

      pointer-events:none;

      z-index:1;

      animation-name:leafFall;

      animation-timing-function:linear;

      animation-iteration-count:infinite;
    }

    .leaf1{
      left:8%;
      animation-duration:12s;
    }

    .leaf2{
      left:72%;
      animation-duration:16s;
      animation-delay:2s;
    }

    .leaf3{
      left:45%;
      animation-duration:20s;
      animation-delay:4s;
    }

    @keyframes leafFall{

      0%{
        transform:
        translate3d(0,-10vh,0)
        rotate(0deg);
      }

      25%{
        transform:
        translate3d(15px,25vh,0)
        rotate(90deg);
      }

      50%{
        transform:
        translate3d(-12px,50vh,0)
        rotate(180deg);
      }

      75%{
        transform:
        translate3d(18px,75vh,0)
        rotate(270deg);
      }

      100%{
        transform:
        translate3d(-10px,120vh,0)
        rotate(360deg);
      }
    }

    /* =========================================
    MOVING ORBS
    ========================================= */

    .orb{

      position:fixed;

      border-radius:50%;

      background:
      rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);

      -webkit-backdrop-filter:blur(12px);

      z-index:1;

      pointer-events:none;
    }

    .orb1{

      width:140px;
      height:140px;

      top:15%;
      left:-40px;

      animation:
      orbMove1 18s ease-in-out infinite;
    }

    .orb2{

      width:110px;
      height:110px;

      top:50%;
      right:-35px;

      animation:
      orbMove2 22s ease-in-out infinite;
    }

    .orb3{

      width:180px;
      height:180px;

      bottom:5%;
      left:20%;

      animation:
      orbMove3 26s ease-in-out infinite;
    }

    @keyframes orbMove1{

      0%{transform:translate(0px,0px);}
      25%{transform:translate(30px,40px);}
      50%{transform:translate(70px,-20px);}
      75%{transform:translate(20px,30px);}
      100%{transform:translate(0px,0px);}
    }

    @keyframes orbMove2{

      0%{transform:translate(0px,0px);}
      25%{transform:translate(-50px,30px);}
      50%{transform:translate(-20px,-40px);}
      75%{transform:translate(-60px,10px);}
      100%{transform:translate(0px,0px);}
    }

    @keyframes orbMove3{

      0%{transform:translate(0px,0px);}
      25%{transform:translate(40px,-30px);}
      50%{transform:translate(-30px,-50px);}
      75%{transform:translate(20px,20px);}
      100%{transform:translate(0px,0px);}
    }

    /* =========================================
    ANIMATIONS
    ========================================= */

    @keyframes textReveal{

      0%{
        opacity:0;
        transform:
        translateY(25px)
        scale(0.96);
      }

      100%{
        opacity:1;
        transform:
        translateY(0px)
        scale(1);
      }
    }

    @keyframes cardReveal{

      0%{
        opacity:0;
        transform:
        translateY(40px);
      }

      100%{
        opacity:1;
        transform:
        translateY(0px);
      }
    }

    @keyframes buttonGlow{

      0%{
        box-shadow:
        0 0 0px rgba(255,255,255,0);
      }

      50%{
        box-shadow:
        0 0 22px rgba(255,255,255,0.20);
      }

      100%{
        box-shadow:
        0 0 0px rgba(255,255,255,0);
      }
    }

    @keyframes pulse{

      0%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.05);
      }

      100%{
        transform:scale(1);
      }
    }

    /* =========================================
    TOP LOGO
    ========================================= */

    .top-logo{

      width:140px;

      margin:0 auto;

      margin-top:12px;

      animation:
      pulse 4s ease-in-out infinite;
    }

    /* =========================================
    HERO
    ========================================= */

    .hero{

      min-height:42vh;

      display:flex;

      flex-direction:column;

      justify-content:center;

      align-items:center;

      text-align:center;

      padding-top:20px;
    }

    .hero-title{

      width:92%;

      max-width:360px;

      animation:
      pulse 5s ease-in-out infinite,
      textReveal 1.2s ease;

      filter:
      drop-shadow(0 10px 25px rgba(0,0,0,0.45));
    }

    .hero-tag{

      width:100%;

      margin-top:20px;

      padding:20px;

      border-radius:28px;

      background:
      rgba(255,255,255,0.10);

      border:
      1px solid rgba(255,255,255,0.16);

      backdrop-filter:blur(10px);

      -webkit-backdrop-filter:blur(10px);

      line-height:1.7;

      font-size:16px;

      animation:
      textReveal 1.6s ease;
    }

    /* =========================================
    CARD
    ========================================= */

    .glass-card{

      width:100%;

      margin-top:24px;

      padding:24px 18px;

      border-radius:34px;

      background:
      rgba(255,255,255,0.12);

      border:
      1px solid rgba(255,255,255,0.18);

      backdrop-filter:blur(12px);

      -webkit-backdrop-filter:blur(12px);

      box-shadow:
      0 12px 40px rgba(0,0,0,0.20);

      animation:
      cardReveal 1.2s ease;
    }

    .card-title{

      text-align:center;

      font-size:28px;

      margin-bottom:12px;
    }

    .card-subtitle{

      text-align:center;

      line-height:1.7;

      font-size:15px;

      margin-bottom:24px;
    }

    /* =========================================
    INPUT
    ========================================= */

    .input-group{

      position:relative;

      margin-bottom:18px;

      animation:
      textReveal 1.4s ease;
    }

    .input-icon{

      position:absolute;

      top:50%;

      left:18px;

      transform:translateY(-50%);
    }

    input{

      width:100%;

      border:none;

      outline:none;

      border-radius:22px;

      padding:
      18px
      18px
      18px
      52px;

      background:
      rgba(255,255,255,0.14);

      color:white;

      font-size:16px;

      backdrop-filter:blur(8px);

      -webkit-backdrop-filter:blur(8px);

      transition:0.25s ease;
    }

    input::placeholder{

      color:
      rgba(255,255,255,0.75);
    }

    input:focus{

      background:
      rgba(255,255,255,0.20);

      transform:scale(1.01);
    }

    /* =========================================
    BUTTON
    ========================================= */

    button{

      width:100%;

      border:none;

      border-radius:24px;

      padding:18px;

      background:
      linear-gradient(
        135deg,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.14)
      );

      color:white;

      font-size:18px;

      font-weight:700;

      cursor:pointer;

      backdrop-filter:blur(8px);

      -webkit-backdrop-filter:blur(8px);

      transition:0.25s ease;

      animation:
      buttonGlow 3s infinite,
      textReveal 1.8s ease;
    }

    button:active{

      transform:scale(0.98);
    }

    /* =========================================
    LOADING BAR
    ========================================= */

    .loading-container{

      display:none;

      margin-top:24px;

      animation:textReveal 0.5s ease;
    }

    .loading-text{

      text-align:center;

      margin-bottom:12px;

      font-size:15px;
    }

    .progress-bar{

      width:100%;

      height:14px;

      background:
      rgba(255,255,255,0.12);

      border-radius:999px;

      overflow:hidden;
    }

    .progress-fill{

      width:0%;

      height:100%;

      border-radius:999px;

      background:
      linear-gradient(
        90deg,
        #6eff8f,
        #c2ffcf
      );

      transition:width 0.25s linear;
    }

    /* =========================================
    RESULTS
    ========================================= */

    .results{

      margin-top:24px;
    }

    .student-card{

      background:
      rgba(255,255,255,0.12);

      border:
      1px solid rgba(255,255,255,0.16);

      border-radius:28px;

      padding:18px;

      margin-bottom:18px;

      backdrop-filter:blur(10px);

      -webkit-backdrop-filter:blur(10px);

      animation:
      cardReveal 0.5s ease;
    }

    .student-name{

      font-size:24px;

      margin-bottom:14px;

      text-align:center;
    }

    .info-box{

      background:
      rgba(255,255,255,0.10);

      border-radius:18px;

      padding:14px;

      margin-bottom:10px;
    }

    .info-label{

      font-size:12px;

      opacity:0.80;

      margin-bottom:4px;
    }

    .info-value{

      font-size:18px;

      font-weight:600;
    }

    /* =========================================
    ERROR
    ========================================= */

    .error{

      text-align:center;

      margin-top:18px;

      color:#ffd7d7;
    }

    /* =========================================
    FOOTER
    ========================================= */

    .footer{

      margin-top:36px;

      margin-bottom:30px;

      text-align:center;

      animation:
      textReveal 2s ease;
    }

    .footer-text{

      font-size:14px;

      line-height:1.7;

      margin-bottom:18px;
    }

    .footer-logo{

      display:flex;

      justify-content:center;
    }

    .footer-logo img{

      width:120px;

      animation:
      pulse 5s ease-in-out infinite;
    }

  </style>

</head>

<body>

  <div class="bg-image"></div>

  <div class="bg-overlay"></div>

  <div class="leaf leaf1">🌿</div>
  <div class="leaf leaf2">🍃</div>
  <div class="leaf leaf3">🌱</div>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="app">

    <img
      src="https://ci3.googleusercontent.com/mail-sig/AIorK4zgCzgfj7mV4jDsEo9FA5FmwI06SwLkAVgJCEq7bIl3YhJP7b3nWRiK7P6-SZF-rvpXWiy5olswOQwI"
      class="top-logo"
      alt="Top Logo"
    >

    <section class="hero">

      <img
        src="https://lh3.googleusercontent.com/d/10HtVquNHiiEMoj4ealygPJFZjRXPTg93"
        class="hero-title"
        alt="Rainforest Falls"
      >

      <div class="hero-tag">

        🦜 Welcome Parents! 🌈<br><br>

        Enter your registered phone number to discover your camper details ✨

      </div>

    </section>

    <div class="glass-card">

      <div class="card-title">
        📱 Parent Lookup
      </div>

      <div class="card-subtitle">

        Enter your registered phone number below 🌿

      </div>

      <div class="input-group">

        <div class="input-icon">
          📞
        </div>

        <input
          type="text"
          id="phone"
          placeholder="Enter Registered Phone Number"
        >

      </div>

      <button onclick="searchStudents()">

        🌴 Explore The Camp

      </button>

      <div
        class="loading-container"
        id="loadingContainer"
      >

        <div
          class="loading-text"
          id="loadingText"
        >
          🌿 Searching the rainforest...
        </div>

        <div class="progress-bar">

          <div
            class="progress-fill"
            id="progressFill"
          ></div>

        </div>

      </div>

      <div
        class="error"
        id="error"
      ></div>

      <div
        class="results"
        id="results"
      ></div>

    </div>

    <div class="footer">

      <div class="footer-text">

        🌿 Rainforest Falls Kids Camp ✨<br>

        Adventure, friendship & unforgettable memories 💚

      </div>

      <div class="footer-logo">

        <img
          src="https://chop.imgix.net/production/e84dfb1c-17d8-4cef-ab61-ee25b808e2df/logo/1584669001294.png"
          alt="Footer Logo"
        >

      </div>

    </div>

  </div>

  <script>

    const SHEET_URL =
    "https://script.google.com/macros/s/AKfycbyOqrKNmKreXmKDCYyE0EuAIk1j0JeUeZISRrBq6TBN-Actzyu6MKGpR8oU0cd_82v-zQ/exec";

    const rainforestEmojis = [
      "🦜","🐒","🦋","🌿","🐸",
      "🍃","🦎","🌺","🐯","🪴",
      "🦁","🌈","🐍","🦚"
    ];

    function randomEmoji(){

      return rainforestEmojis[
        Math.floor(
          Math.random() *
          rainforestEmojis.length
        )
      ];
    }

    async function searchStudents(){

      const phone =
      document
      .getElementById("phone")
      .value
      .trim()
      .toLowerCase();

      const loadingContainer =
      document.getElementById("loadingContainer");

      const progressFill =
      document.getElementById("progressFill");

      const loadingText =
      document.getElementById("loadingText");

      const error =
      document.getElementById("error");

      const results =
      document.getElementById("results");

      loadingContainer.style.display = "block";

      progressFill.style.width = "0%";

      error.innerHTML = "";

      results.innerHTML = "";

      let progress = 0;

      const loadingMessages = [

        "🌿 Searching the rainforest...",
        "🦜 Calling the jungle guides...",
        "🍃 Looking for your campers...",
        "🐒 Exploring the waterfall trails...",
        "🌈 Almost there..."
      ];

      let messageIndex = 0;

      loadingText.innerHTML =
      loadingMessages[0];

      const interval = setInterval(() => {

        progress += 8;

        if(progress > 92){
          progress = 92;
        }

        progressFill.style.width =
        progress + "%";

        if(progress % 20 === 0){

          messageIndex++;

          if(
            loadingMessages[messageIndex]
          ){

            loadingText.innerHTML =
            loadingMessages[messageIndex];
          }
        }

      },180);

      try{

        const response =
        await fetch(SHEET_URL);

        const data =
        await response.json();

        clearInterval(interval);

        progressFill.style.width = "100%";

        setTimeout(() => {

          loadingContainer.style.display =
          "none";

        },500);

        const matchedStudents =
        data.filter(item =>

          item.UUID
          .toString()
          .toLowerCase() === phone
        );

        if(matchedStudents.length === 0){

          error.innerHTML =
          "🌧️ No campers were found with this phone number.";

          return;
        }

        matchedStudents.forEach(student => {

          const card =
          document.createElement("div");

          card.className =
          "student-card";

          card.innerHTML = `

            <div class="student-name">
              ${randomEmoji()} ${student.NAME}
            </div>

            <div class="info-box">

              <div class="info-label">
                🚩 TEAM
              </div>

              <div class="info-value">
                ${student.TEAM}
              </div>

            </div>

            <div class="info-box">

              <div class="info-label">
                👥 CREW
              </div>

              <div class="info-value">
                ${student.CREW}
              </div>

            </div>

            <div class="info-box">

              <div class="info-label">
                🎤 LEADER
              </div>

              <div class="info-value">
                ${student.LEADER}
              </div>

            </div>

            <div class="info-box">

              <div class="info-label">
                🚌 PICKUP
              </div>

              <div class="info-value">
                ${student.PICKUP}
              </div>

            </div>

          `;

          results.appendChild(card);

        });

        celebrate();

      }

      catch(err){

        clearInterval(interval);

        loadingContainer.style.display =
        "none";

        error.innerHTML =
        "🌧️ Lost connection to the rainforest trails.";

        console.error(err);
      }
    }

    function celebrate(){

      for(let i=0; i<18; i++){

        const confetti =
        document.createElement("div");

        confetti.innerHTML =
        rainforestEmojis[
          Math.floor(
            Math.random() *
            rainforestEmojis.length
          )
        ];

        confetti.style.position = "fixed";

        confetti.style.left =
        Math.random()*100 + "vw";

        confetti.style.top = "-20px";

        confetti.style.fontSize =
        (18 + Math.random()*20) + "px";

        confetti.style.zIndex = "999";

        confetti.style.pointerEvents = "none";

        confetti.style.transition =
        "transform 3s linear, opacity 3s";

        document.body.appendChild(confetti);

        setTimeout(() => {

          confetti.style.transform =
          `translateY(${window.innerHeight + 100}px) rotate(720deg)`;

          confetti.style.opacity = "0";

        },50);

        setTimeout(() => {

          confetti.remove();

        },3000);
      }
    }

  </script>

</body>

</html>
