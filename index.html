<!DOCTYPE html>
<!--
  ==========================================================
  DOCUMENT TYPE DECLARATION
  ==========================================================

  This tells the browser that this document uses HTML5.

  Without this line:
  - Some browsers may enter compatibility mode.
  - Layouts can behave inconsistently.
  - Modern CSS features may partially fail.

  Always keep this as the FIRST line in your HTML.
-->

<html lang="en">
<!--
  lang="en"
  Helps:
  - Accessibility tools
  - Search engines
  - Translation systems
  - Screen readers
-->

<head>

  <!-- Character encoding -->
  <meta charset="UTF-8">

  <!--
    Viewport settings are CRITICAL for mobile responsiveness.

    width=device-width
    = makes page width equal to device width.

    initial-scale=1.0
    = prevents zoom weirdness on first load.

    viewport-fit=cover
    = allows content to extend into modern phone safe areas
      like iPhone notches.
  -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <!-- Browser tab title -->
  <title>RAINFOREST FALLS 🌿</title>

  <!--
    PERFORMANCE OPTIMIZATION

    preconnect tells browser:
    "We will soon need resources from this domain."

    This speeds up font loading.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!--
    Google Font Import

    Fredoka is a rounded playful font.
    Great for carnival / kids UI.
  -->
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    /*
      ==========================================================
      GLOBAL RESET
      ==========================================================

      Different browsers add their own spacing.
      Resetting everything gives consistency.
    */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;

      /*
        Removes ugly blue tap highlight on mobile.
      */
      -webkit-tap-highlight-color:transparent;
    }

    /*
      HTML ROOT SETTINGS
    */
    html{

      width:100%;

      /*
        Prevents accidental sideways scrolling.
      */
      overflow-x:hidden;

      /*
        Enables smooth anchor scrolling.
      */
      scroll-behavior:smooth;

      /*
        Prevents iOS random text zooming.
      */
      -webkit-text-size-adjust:100%;
    }

    body{

      width:100%;
      min-height:100vh;

      overflow-x:hidden;
      overflow-y:auto;

      position:relative;

      /* Main font */
      font-family:'Fredoka', sans-serif;

      color:white;

      /*
        Pure black fallback background.
        Useful while image loads.
      */
      background:#000;

      /*
        Keeps background visually fixed.
      */
      background-attachment:fixed;

      /* Better mobile scrolling */
      -webkit-overflow-scrolling:touch;

      /*
        Global text shadow.
        Helps readability on bright backgrounds.
      */
      text-shadow:
      0 2px 12px rgba(0,0,0,0.40);
    }

    img{
      display:block;
      max-width:100%;
    }

    /*
      ==========================================================
      FIXED BACKGROUND IMAGE SYSTEM
      ==========================================================

      Instead of applying background image directly to body,
      we use a dedicated fixed div.

      WHY?
      - smoother animations
      - better mobile performance
      - avoids repaint issues
      - easier overlay layering
    */

    .bg-image{

      position:fixed;
      inset:0;

      width:100vw;
      height:100lvh;

      background-image:
      url('https://lh3.googleusercontent.com/d/1VXu4QTjcT-9VyQxGehvKQhiG9Y6OUsgC');

      background-size:cover;
      background-position:center center;
      background-repeat:no-repeat;

      z-index:-30;

      pointer-events:none;

      /*
        translate3d hack forces GPU rendering.
        This improves animation smoothness.
      */
      transform:
      translate3d(0,0,0);

      -webkit-transform:
      translate3d(0,0,0);

      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;

      will-change:transform;
    }

    /*
      Dark overlay layer.

      This helps text remain readable.
    */
    .bg-overlay{

      position:fixed;
      inset:0;

      width:100%;
      height:100lvh;

      background:
      linear-gradient(
        to bottom,
        rgba(0,0,0,0.10),
        rgba(0,0,0,0.50)
      );

      z-index:-29;

      pointer-events:none;
    }

    /*
      GPU acceleration helpers.
    */
    .app,
    .glass-card,
    .hero,
    .results{

      transform:
      translateZ(0);

      -webkit-transform:
      translateZ(0);
    }

    /*
      MAIN APP WRAPPER
    */
    .app{

      width:100%;

      /*
        Mobile-first max width.
        Prevents app from becoming too wide.
      */
      max-width:430px;

      margin:0 auto;

      /*
        env() automatically respects phone safe areas.
      */
      padding:
      env(safe-area-inset-top)
      18px
      env(safe-area-inset-bottom);

      position:relative;
      z-index:5;
    }

    /* =========================================================
       FLOATING LEAF PARTICLES
       ========================================================= */

    .leaf{

      position:fixed;
      top:-10vh;

      font-size:24px;

      opacity:0.60;

      pointer-events:none;

      z-index:1;

      animation-name:leafFall;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
    }

    /*
      Each leaf has different:
      - starting position
      - duration
      - delay

      This creates natural randomness.
    */

    .leaf1{
      left:8%;
      animation-duration:12s;
    }

    .leaf2{
      left:72%;
      animation-duration:16s;
      animation-delay:2s;
    }

    .leaf3{
      left:45%;
      animation-duration:20s;
      animation-delay:4s;
    }

    /*
      KEYFRAME ANIMATION

      Moves leaf from top to bottom.
    */
    @keyframes leafFall{

      0%{
        transform:
        translate3d(0,-10vh,0)
        rotate(0deg);
      }

      100%{
        transform:
        translate3d(-10px,120vh,0)
        rotate(360deg);
      }
    }

    /* =========================================================
       GLASSMORPHIC FLOATING ORBS
       ========================================================= */

    .orb{

      position:fixed;

      border-radius:50%;

      background:
      rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);

      z-index:1;
      pointer-events:none;
    }

    /*
      Orbs create depth.
      They slowly drift around.
    */

    .orb1{
      width:140px;
      height:140px;
      top:15%;
      left:-40px;
      animation:orbMove1 18s ease-in-out infinite;
    }

    .orb2{
      width:110px;
      height:110px;
      top:50%;
      right:-35px;
      animation:orbMove2 22s ease-in-out infinite;
    }

    .orb3{
      width:180px;
      height:180px;
      bottom:5%;
      left:20%;
      animation:orbMove3 26s ease-in-out infinite;
    }

    /*
      Organic floating movement.
    */
    @keyframes orbMove1{
      0%{transform:translate(0px,0px);}
      25%{transform:translate(30px,40px);}
      50%{transform:translate(70px,-20px);}
      75%{transform:translate(20px,30px);}
      100%{transform:translate(0px,0px);}
    }

    @keyframes orbMove2{
      0%{transform:translate(0px,0px);}
      25%{transform:translate(-50px,30px);}
      50%{transform:translate(-20px,-40px);}
      75%{transform:translate(-60px,10px);}
      100%{transform:translate(0px,0px);}
    }

    @keyframes orbMove3{
      0%{transform:translate(0px,0px);}
      25%{transform:translate(40px,-30px);}
      50%{transform:translate(-30px,-50px);}
      75%{transform:translate(20px,20px);}
      100%{transform:translate(0px,0px);}
    }

    /* =========================================================
       ENTRANCE ANIMATIONS
       ========================================================= */

    /*
      Fade upward reveal animation.
    */
    @keyframes textReveal{

      0%{
        opacity:0;
        transform:
        translateY(25px)
        scale(0.96);
      }

      100%{
        opacity:1;
        transform:
        translateY(0px)
        scale(1);
      }
    }

    /*
      Card slide animation.
    */
    @keyframes cardReveal{

      0%{
        opacity:0;
        transform:translateY(40px);
      }

      100%{
        opacity:1;
        transform:translateY(0px);
      }
    }

    /*
      Gentle glowing pulse.
    */
    @keyframes buttonGlow{

      0%{
        box-shadow:0 0 0px rgba(255,255,255,0);
      }

      50%{
        box-shadow:0 0 22px rgba(255,255,255,0.20);
      }

      100%{
        box-shadow:0 0 0px rgba(255,255,255,0);
      }
    }

    /*
      Scale pulse effect.
    */
    @keyframes pulse{

      0%{transform:scale(1);}
      50%{transform:scale(1.05);}
      100%{transform:scale(1);}
    }

    /*
      ==========================================================
      TOP LOGO
      ==========================================================
    */

    .top-logo{

      width:120px;

      margin:0 auto;

      margin-top:4px;
      margin-bottom:-10px;

      animation:pulse 4s ease-in-out infinite;
    }

    /* =========================================================
       HERO SECTION
       ========================================================= */

    .hero{

      min-height:auto;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-align:center;

      padding-top:0px;

      margin-top:-8px;
      margin-bottom:-10px;
    }

    .hero-title{

      width:100%;
      max-width:360px;

      animation:
      pulse 5s ease-in-out infinite,
      textReveal 1.2s ease;

      filter:
      drop-shadow(0 10px 25px rgba(0,0,0,0.45));
    }

    /* =========================================================
       MAIN GLASS CARD
       ========================================================= */

    .glass-card{

      width:100%;

      margin-top:8px;

      padding:24px 18px;

      border-radius:34px;

      /*
        Glassmorphism effect.
      */
      background:
      rgba(255,255,255,0.12);

      border:
      1px solid rgba(255,255,255,0.18);

      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);

      box-shadow:
      0 12px 40px rgba(0,0,0,0.20);

      animation:
      cardReveal 1.2s ease;
    }

    .card-title{
      text-align:center;
      font-size:28px;
      margin-bottom:12px;
    }

    .card-subtitle{
      text-align:center;
      line-height:1.7;
      font-size:15px;
      margin-bottom:24px;
    }

    /* =========================================================
       INPUT SYSTEM
       ========================================================= */

    .input-group{

      position:relative;

      margin-bottom:18px;

      animation:textReveal 1.4s ease;
    }

    /*
      Phone emoji icon positioning.
    */
    .input-icon{

      position:absolute;

      top:50%;
      left:18px;

      transform:translateY(-50%);
    }

    input{

      width:100%;

      border:none;
      outline:none;

      border-radius:22px;

      padding:
      18px
      18px
      18px
      52px;

      background:
      rgba(255,255,255,0.14);

      color:white;

      font-size:16px;

      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);

      transition:0.25s ease;
    }

    input::placeholder{
      color:rgba(255,255,255,0.75);
    }

    /*
      Input focus feedback.
    */
    input:focus{

      background:
      rgba(255,255,255,0.20);

      transform:scale(1.01);
    }

    /* =========================================================
       BUTTON STYLING
       ========================================================= */

    button{

      width:100%;

      border:none;

      border-radius:24px;

      padding:18px;

      background:
      linear-gradient(
        135deg,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.14)
      );

      color:white;

      font-size:18px;
      font-weight:700;

      cursor:pointer;

      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);

      transition:0.25s ease;

      animation:
      buttonGlow 3s infinite,
      textReveal 1.8s ease;
    }

    /*
      Gives tactile feel on tap.
    */
    button:active{
      transform:scale(0.98);
    }

    /*
      Disabled state while loading.

      Prevents:
      - duplicate API calls
      - duplicate cards
      - accidental spam requests
    */
    button:disabled{
      opacity:0.7;
      cursor:not-allowed;
    }

    /* =========================================================
       LOADING SYSTEM
       ========================================================= */

    .loading-container{

      display:none;

      margin-top:24px;

      animation:textReveal 0.5s ease;
    }

    .loading-text{
      text-align:center;
      margin-bottom:12px;
      font-size:15px;
    }

    .progress-bar{

      width:100%;
      height:14px;

      background:
      rgba(255,255,255,0.12);

      border-radius:999px;

      overflow:hidden;
    }

    .progress-fill{

      width:0%;
      height:100%;

      border-radius:999px;

      background:
      linear-gradient(
        90deg,
        #6eff8f,
        #c2ffcf
      );

      transition:width 0.25s linear;
    }

    /* =========================================================
       RESULTS SECTION
       ========================================================= */

    .results{
      margin-top:24px;
    }

    .student-card{

      background:
      rgba(255,255,255,0.12);

      border:
      1px solid rgba(255,255,255,0.16);

      border-radius:28px;

      padding:18px;

      margin-bottom:18px;

      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);

      animation:cardReveal 0.5s ease;
    }

    .student-name{
      font-size:24px;
      margin-bottom:14px;
      text-align:center;
    }

    .info-box{

      background:
      rgba(255,255,255,0.10);

      border-radius:18px;

      padding:14px;

      margin-bottom:10px;
    }

    .info-label{
      font-size:12px;
      opacity:0.80;
      margin-bottom:4px;
    }

    .info-value{
      font-size:18px;
      font-weight:600;
    }

    /* =========================================================
       ERROR MESSAGE
       ========================================================= */

    .error{
      text-align:center;
      margin-top:18px;
      color:#ffd7d7;
    }

    /* =========================================================
       FOOTER
       ========================================================= */

    .footer{

      margin-top:36px;
      margin-bottom:30px;

      text-align:center;

      animation:textReveal 2s ease;
    }

    .footer-text{
      font-size:14px;
      line-height:1.7;
      margin-bottom:18px;
    }

    .footer-logo{
      display:flex;
      justify-content:center;
    }

    .footer-logo img{
      width:120px;
      animation:pulse 5s ease-in-out infinite;
    }

  </style>

</head>

<body>

  <!--
    ==========================================================
    BACKGROUND VISUAL LAYERS
    ==========================================================
  -->

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <!-- Floating decorative particles -->
  <div class="leaf leaf1">🌿</div>
  <div class="leaf leaf2">🍃</div>
  <div class="leaf leaf3">🌱</div>

  <!-- Floating glowing circles -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Main app wrapper -->
  <div class="app">

    <!-- Top branding logo -->
    <img
      src="https://ci3.googleusercontent.com/mail-sig/AIorK4zgCzgfj7mV4jDsEo9FA5FmwI06SwLkAVgJCEq7bIl3YhJP7b3nWRiK7P6-SZF-rvpXWiy5olswOQwI"
      class="top-logo"
      alt="Top Logo"
    >

    <!-- HERO SECTION -->
    <section class="hero">

      <img
        src="https://lh3.googleusercontent.com/d/1220_kk_C4yBBZkoplEHs8qFWuouAdrCh"
        class="hero-title"
        alt="Rainforest Falls"
      >

    </section>

    <!-- Main glass card -->
    <div class="glass-card">

      <div class="card-title">
       👋 Welcome Parent
      </div>

      <div class="card-subtitle">
        Enter your registered phone number below
      </div>

      <!-- INPUT FIELD -->
      <div class="input-group">

        <div class="input-icon">
          📞
        </div>

        <input
          type="text"
          id="phone"
          placeholder="Phone Number"
        >

      </div>

      <!--
        onclick triggers JavaScript function.
      -->
      <button id="searchButton" onclick="searchStudents()">
        🌴 Search 🌴
      </button>

      <!-- Loading section -->
      <div
        class="loading-container"
        id="loadingContainer"
      >

        <div
          class="loading-text"
          id="loadingText"
        >
          🌿 Searching the rainforest...
        </div>

        <div class="progress-bar">

          <div
            class="progress-fill"
            id="progressFill"
          ></div>

        </div>

      </div>

      <!-- Error message container -->
      <div class="error" id="error"></div>

      <!-- Dynamic results injected here -->
      <div class="results" id="results"></div>

    </div>

    <!-- FOOTER -->
    <div class="footer">

      <div class="footer-text">
        🌿 Rainforest Falls Kids Carnival ✨<br>
        Adventure, friendship & unforgettable memories 💚
      </div>

      <div class="footer-logo">

        <img
          src="https://chop.imgix.net/production/e84dfb1c-17d8-4cef-ab61-ee25b808e2df/logo/1584669001294.png"
          alt="Footer Logo"
        >

      </div>

    </div>

  </div>

  <script>

    /*
      ==========================================================
      GOOGLE APPS SCRIPT ENDPOINT
      ==========================================================

      Your frontend sends requests to this URL.

      This Apps Script acts like a backend API.

      Example:
      ?phone=9876543210

      Apps Script searches Google Sheet and returns JSON.
    */

    const SHEET_URL =
    "https://script.google.com/macros/s/AKfycbz9g9Y2FGPw88OGdxuyCAurCaZNM-iShkSGvpXlhYzRowzg_pcH1BIe6aZjiRQ3XZSbOA/exec";

    /*
      Random emojis for dynamic student cards.
    */
    const rainforestEmojis = [
      "🦜","🐒","🦋","🌿","🐸",
      "🍃","🦎","🌺","🐯","🪴",
      "🦁","🌈","🐍","🦚"
    ];

    /*
      GLOBAL LOCK VARIABLE

      This prevents:
      - double clicking
      - duplicate requests
      - duplicate results
      - race conditions
    */
    let isSearching = false;

    /*
      Returns a random emoji.
    */
    function randomEmoji(){

      return rainforestEmojis[
        Math.floor(
          Math.random() *
          rainforestEmojis.length
        )
      ];
    }

    /*
      ==========================================================
      MAIN SEARCH FUNCTION
      ==========================================================
    */

    async function searchStudents(){

      /*
        SAFETY CHECK

        If search already running:
        stop immediately.
      */
      if(isSearching){
        return;
      }

      isSearching = true;

      /*
        Grab button reference.
      */
      const button =
      document.getElementById(
        "searchButton"
      );

      /*
        Disable button while loading.
      */
      button.disabled = true;

      /*
        Read phone input.

        trim()
        removes accidental spaces.
      */
      const phone =
      document
      .getElementById("phone")
      .value
      .trim()
      .toLowerCase();

      /*
        ======================================================
        PHONE VALIDATION
        ======================================================

        This prevents unnecessary API requests.

        Why validation matters:
        - reduces server load
        - improves user experience
        - prevents accidental empty searches
        - prevents malformed queries

        Regex Explanation:

        ^       = start of string
        [0-9]   = only numbers allowed
        {10}    = exactly 10 digits
        $       = end of string

        So this only accepts:
        9876543210

        and rejects:
        98765
        abc123
        98-765
      */

      const phoneRegex = /^[0-9]{10}$/;

      if(!phoneRegex.test(phone)){

        document.getElementById("error").innerHTML =
        "⚠️ Please enter a valid 10-digit phone number.";

        button.disabled = false;

        isSearching = false;

        return;
      }

      /*
        Grab all required DOM elements.
      */
      const loadingContainer =
      document.getElementById(
        "loadingContainer"
      );

      const progressFill =
      document.getElementById(
        "progressFill"
      );

      const loadingText =
      document.getElementById(
        "loadingText"
      );

      const error =
      document.getElementById(
        "error"
      );

      const results =
      document.getElementById(
        "results"
      );

      /*
        Reset UI state.
      */
      loadingContainer.style.display =
      "block";

      progressFill.style.width =
      "0%";

      error.innerHTML = "";
      results.innerHTML = "";

      /*
        Fake progress system.

        Makes app feel responsive.
      */
      let progress = 0;

      const loadingMessages = [
        "🌿 Searching the rainforest...",
        "🦜 Calling the jungle guides...",
        "🍃 Looking for your campers...",
        "🐒 Exploring the waterfall trails...",
        "🌈 Almost there..."
      ];

      let messageIndex = 0;

      loadingText.innerHTML =
      loadingMessages[0];

      /*
        setInterval repeatedly runs code.

        Here:
        every 180 milliseconds.
      */
      const interval = setInterval(() => {

        progress += 8;

        /*
          Prevents progress from reaching 100%
          before actual fetch completes.
        */
        if(progress > 92){
          progress = 92;
        }

        progressFill.style.width =
        progress + "%";

        /*
          Rotate loading messages.
        */
        if(progress % 20 === 0){

          messageIndex++;

          if(
            loadingMessages[messageIndex]
          ){

            loadingText.innerHTML =
            loadingMessages[
              messageIndex
            ];
          }
        }

      },180);

      try{

        /*
          ======================================================
          API REQUEST
          ======================================================

          encodeURIComponent protects special characters.

          Example:
          + becomes %2B
        */

        const response =
        await fetch(
          `${SHEET_URL}?phone=${encodeURIComponent(phone)}`
        );

        /*
          Convert response into JSON.
        */
        const data =
        await response.json();

        /*
          Stop fake progress loop.
        */
        clearInterval(interval);

        progressFill.style.width =
        "100%";

        const matchedStudents = data;

        results.innerHTML = "";

        /*
          If no students found.
        */
        if(matchedStudents.length === 0){

          error.innerHTML =
          "🌧️ No campers were found with this phone number.";

          return;
        }

        /*
          LOOP THROUGH RESULTS
        */
        matchedStudents.forEach(student => {

          /*
            Create new div element.
          */
          const card =
          document.createElement("div");

          card.className =
          "student-card";

          /*
            Template literal.

            Allows:
            ${dynamicVariables}
          */
          card.innerHTML = `

            <div class="student-name">
              ${randomEmoji()} ${student.NAME}
            </div>

            <div class="info-box">

              <div class="info-label">
                🚩 TEAM
              </div>

              <div class="info-value">
                ${student.TEAM}
              </div>

            </div>

            <div class="info-box">

              <div class="info-label">
                👥 CREW
              </div>

              <div class="info-value">
                ${student.CREW}
              </div>

            </div>

            <div class="info-box">

              <div class="info-label">
                🎤 LEADER
              </div>

              <div class="info-value">
                ${student.LEADER}
              </div>

            </div>

            <div class="info-box">

              <div class="info-label">
                🚌 PICKUP
              </div>

              <div class="info-value">
                ${student.PICKUP}
              </div>

            </div>

          `;

          /*
            Inject card into results container.
          */
          results.appendChild(card);

        });

        /*
          Trigger celebration effect.
        */
        celebrate();

      }

      catch(err){

        /*
          Network failure handler.
        */
        error.innerHTML =
        "🌧️ Lost connection to the rainforest trails.";

        console.error(err);

      }

      finally{

        /*
          finally ALWAYS runs.

          Even if error happens.
        */

        clearInterval(interval);

        setTimeout(() => {

          loadingContainer.style.display =
          "none";

          button.disabled = false;

          isSearching = false;

        },500);
      }
    }

    /*
      ==========================================================
      CELEBRATION PARTICLE EFFECT
      ==========================================================
    */

    function celebrate(){

      const emojis = [
        "✨","🌿","🍃","🦋","🌈"
      ];

      const centerX =
      window.innerWidth / 2;

      const centerY =
      window.innerHeight * 0.42;

      /*
        Create 18 particles.
      */
      for(let i = 0; i < 18; i++){

        const particle =
        document.createElement("div");

        particle.innerHTML =
        emojis[
          Math.floor(
            Math.random() *
            emojis.length
          )
        ];

        /*
          Dynamic inline styling.
        */
        particle.style.position =
        "fixed";

        particle.style.left =
        centerX + "px";

        particle.style.top =
        centerY + "px";

        particle.style.fontSize =
        (18 + Math.random() * 10)
        + "px";

        particle.style.pointerEvents =
        "none";

        particle.style.zIndex =
        "9999";

        particle.style.opacity =
        "0";

        particle.style.transition =
        "transform 2.8s cubic-bezier(0.22,1,0.36,1), opacity 2.8s ease";

        document.body.appendChild(
          particle
        );

        /*
          Random explosion direction.
        */
        const angle =
        Math.random() *
        Math.PI * 2;

        const distance =
        80 + Math.random() * 140;

        const x =
        Math.cos(angle) *
        distance;

        const y =
        Math.sin(angle) *
        distance;

        /*
          Animate outward.
        */
        setTimeout(() => {

          particle.style.opacity =
          "1";

          particle.style.transform = `
            translate(${x}px, ${y}px)
            scale(1.4)
            rotate(${Math.random()*120-60}deg)
          `;

        },30);

        /* Fade out */
        setTimeout(() => {

          particle.style.opacity =
          "0";

          particle.style.transform +=
          " scale(0.6)";

        },1800);

        /* Remove from DOM */
        setTimeout(() => {
          particle.remove();
        },3000);
      }
    }

  

    /*
      ==========================================================
      ENTER KEY SUPPORT
      ==========================================================

      This allows users to press ENTER instead of tapping button.

      Better UX especially for:
      - desktop users
      - laptop users
      - power users
      - external keyboard users on mobile/tablet
    */

    document
    .getElementById("phone")
    .addEventListener("keypress", function(event){

      /*
        Detect Enter key.
      */
      if(event.key === "Enter"){

        /*
          Trigger same search function.
        */
        searchStudents();
      }
    });

  </script>
